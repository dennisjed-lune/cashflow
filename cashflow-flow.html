/* ══════════════════════════════════════════════════════════════════
   Cashflow · FULL FLOW — Lune SDK prototype (from Figma
   "Cashflow New Implimentation" page, flow-corrected).

   The journey:  Cashflow landing → Timeline sheet
                                  → Inflow / Outflow sheets
                                    → Top source / merchant detail
                                    → Transaction detail (tags, notes,
                                      enrichment feedback)
                 + Select-cards sheet, period picker, empty states.

   Flow fixes over the Figma frames (each maps to a PRD issue):
   F1  Date first: the period is a first-class control on the landing
       screen; every number on every screen derives from it.
   F2  One data model: donuts, trends, timeline, tops and lists all
       sum the SAME transactions — no 5,760-vs-4,326 contradictions.
   F3  Timeline uses whole calendar months with valid labels
       (no "Feb 1st – 31st"), current month explicitly "so far".
   F4  Quick presets + year-aware month picker (no funnel detour).
   F5  Tap affordances (chevrons/press states) on every drillable row.
   F6  Empty states for landing + sheets when a period has no data.
   F7  Copy: "received" not "recieved", raw descriptions match the
       merchant, consistent "last 6 months" scope labels.
   ══════════════════════════════════════════════════════════════════ */

/* ── theme (Lune DS, light) ─────────────────────────────────────── */
const T = {

/* ── helpers ────────────────────────────────────────────────────── */
function fmtAED(n) { return Math.round(n).toLocaleString('en-US'); }
function fmt2(n) { return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtK(n) { return Math.abs(n) >= 1000 ? (Math.round(n / 100) / 10).toFixed(Math.round(n / 100) % 10 === 0 ? 0 : 1) + 'K' : String(Math.round(n)); }
function hexA(hex, a) {
  const h = hex.replace('#', '');
  const n = parseInt(h.length === 3 ? h.split('').map(c => c + c).join('') : h, 16);
  return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
}
function pressable(onClick) {
  return {
    role: 'button', tabIndex: 0, onClick,
    onKeyDown: (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onClick && onClick(e); } },
  };
}
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_ABBR  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }

/* "today" inside the prototype */
const NOW = { y: 2026, m: 6, d: 21 };            // 21 July 2026
const mKey = (y, m) => y * 12 + m;
const NOW_KEY = mKey(NOW.y, NOW.m);

/* ── cards (Select Cards sheet) ─────────────────────────────────── */
const CARDS = [

];

/* ── brands ─────────────────────────────────────────────────────── */
const BRANDS = {
  dib:      { name: 'Dubai Islamic Bank',              short: 'DIB', color: '#0F6E45', cat: 'Salary',           group: 'income',   dir: 'in',  freq: 'Monthly',   raw: 'SALARY TRANSFER DUBAI ISLAMIC BANK PJSC' },

  emaar:    { name: 'Emaar',                           short: 'E',  color: '#1A1A1A', cat: 'Housing',          group: 'bills',    dir: 'out', freq: 'Monthly',   raw: 'EMAAR PROPERTIES RENT AUTOPAY' },
  dewa:     { name: 'DEWA',                            short: 'DW', color: '#00833E', cat: 'Bills & utilities', group: 'bills',    dir: 'out', freq: 'Monthly',   raw: 'DEWA BILL PAYMENT 100482-01' },
  etisalat: { name: 'Etisalat',                        short: 'ET', color: '#9B1E26', cat: 'Bills & utilities', group: 'bills',    dir: 'out', freq: 'Monthly',   raw: 'ETISALAT UAE POSTPAID 0501234567' },
  carrefour:{ name: 'Carrefour',                       short: 'C',  color: '#004E9F', cat: 'Groceries',        group: 'everyday', dir: 'out', freq: 'Weekly',    raw: 'CARREFOUR MAF HYPERMARKET DXB' },
  talabat:  { name: 'Talabat',                         short: 'T',  color: '#FF5A00', cat: 'Dining',           group: 'everyday', dir: 'out', freq: 'Weekly',    raw: 'TALABAT GENERAL TRADING DUBAI' },
  apple:    { name: 'Apple Store',                     short: 'A',  color: '#1D1D1F', cat: 'Shopping',         group: 'everyday', dir: 'out', freq: 'Occasional', raw: 'APPLE STORE DUBAI MALL' },
  noon:     { name: 'Noon',                            short: 'N',  color: '#B99B00', cat: 'Shopping',         group: 'everyday', dir: 'out', freq: 'Occasional', raw: 'NOON COM FZ LLC DUBAI' },
  adnoc:    { name: 'ADNOC',                           short: 'AD', color: '#005EB8', cat: 'Transport',        group: 'everyday', dir: 'out', freq: 'Weekly',    raw: 'ADNOC DISTRIBUTION 774 DXB' },
  savings:  { name: 'Transfer to Savings Pot',         short: 'S',  color: '#0A634D', cat: 'Savings',          group: 'savings',  dir: 'out', freq: 'Monthly',   raw: 'STANDING ORDER SAVINGS POT 07' },

/* ── transaction generator: ONE source of truth ─────────────────
   Deterministic per month; every screen aggregates these txns.   */
function monthTxns(y, m) {
  if (mKey(y, m) > NOW_KEY || mKey(y, m) < mKey(2025, 0)) return [];
  const dim = daysInMonth(y, m);
  const cut = mKey(y, m) === NOW_KEY ? NOW.d : dim;      // month-to-date cutoff
  const seed = (y * 37 + m * 11);
  const v = (base, spread, salt) => Math.round(base + spread * Math.sin(seed * 2.17 + salt * 5.13));
  const txns = [];
  const add = (day, brandId, amount, card) => {
    if (day > cut) return;
    txns.push({ id: `${y}-${m}-${brandId}-${day}-${Math.abs(amount)}`, y, m, day, brandId, amount, card });
  };
  /* inflow */
  add(25, 'dib', 18000, 'platinum');
  add(3,  'enbd', v(3000, 400, 1), 'platinum');
  if (m % 3 === 0) add(21, 'mocd', 2000, 'platinum');
  if (m % 2 === 1) add(v(12, 5, 9), 'family', 2000, 'platinum');
  /* outflow — May (m=4) peaks on purpose */
  const peak = m === 4 ? 1.22 : 1;
  add(1,  'emaar', -8000, 'platinum');
  add(9,  'dewa', -v(640, 120, 2), 'platinum');
  add(11, 'etisalat', -349, 'cashback');
  [5, 12, 19, 26].forEach((d, i) => add(d, 'carrefour', -Math.round(v(520, 90, 3 + i) * peak), 'emerald'));
  [4, 15, 24].forEach((d, i) => add(d, 'talabat', -Math.round(v(150, 45, 6 + i) * peak), 'cashback'));
  [6, 14, 22, 28].forEach((d, i) => add(d, 'adnoc', -v(185, 40, 10 + i), 'emerald'));
  if (m % 3 === 2) add(17, 'apple', -Math.round(v(1450, 350, 13) * peak), 'emerald');
  if (m % 2 === 0) add(20, 'noon', -v(410, 130, 14), 'cashback');
  add(26, 'savings', -2000, 'platinum');
  return txns.sort((a, b) => b.day - a.day);
}

/* period = list of {y,m} months (chips render a friendly label) */
function monthsBack(n) {
  const out = [];
  for (let i = n - 1; i >= 0; i--) {
    const k = NOW_KEY - i;
    out.push({ y: Math.floor(k / 12), m: k % 12 });
  }
  return out;
}
const PRESETS = [
  { id: 'this',  label: 'This month',    months: () => monthsBack(1) },
  { id: 'last',  label: 'Last month',    months: () => [monthsBack(2)[0]] },
  { id: 'l3',    label: 'Last 3 months', months: () => monthsBack(3) },
  { id: 'l6',    label: 'Last 6 months', months: () => monthsBack(6) },
];
function periodLabel(period) {
  const ms = period.months;
  const f = ms[0], l = ms[ms.length - 1];
  const one = ms.length === 1;
  if (one && mKey(f.y, f.m) === NOW_KEY) return `1–${NOW.d} ${MONTH_ABBR[f.m]} ’${String(f.y).slice(2)}`;
  if (one) return `${MONTH_ABBR[f.m]} 1–${daysInMonth(f.y, f.m)} ’${String(f.y).slice(2)}`;
  return `${MONTH_ABBR[f.m]} ’${String(f.y).slice(2)} – ${MONTH_ABBR[l.m]} ’${String(l.y).slice(2)}`;
}
function periodTitle(period) {
  const p = PRESETS.find(p => p.id === period.preset);
  return p ? p.label : 'Custom range';
}

/* aggregate a period through the card filter */
function useLedger(period, activeCards) {
  return useMemo(() => {
    const txns = period.months.flatMap(({ y, m }) => monthTxns(y, m))
      .filter(t => activeCards.has(t.card))
      .map(t => ({ ...t, brand: BRANDS[t.brandId] }));
    const inflow = txns.filter(t => t.amount > 0);
    const outflow = txns.filter(t => t.amount < 0);
    const inTotal = inflow.reduce((a, t) => a + t.amount, 0);
    const outTotal = -outflow.reduce((a, t) => a + t.amount, 0);
    return { txns, inflow, outflow, inTotal, outTotal, net: inTotal - outTotal };
  }, [period, activeCards]);
}
function historySeries(activeCards) {
  const n = NOW_KEY - mKey(2025, 0) + 1;          // all months since data begins
  return monthsBack(n).map(({ y, m }) => {
    const txns = monthTxns(y, m).filter(t => activeCards.has(t.card));
    const groups = {};
    let inn = 0, out = 0;
    txns.forEach(t => {
      const b = BRANDS[t.brandId];
      groups[b.group] = (groups[b.group] || 0) + Math.abs(t.amount);
      if (t.amount > 0) inn += t.amount; else out -= t.amount;
    });
    return { y, m, mtd: mKey(y, m) === NOW_KEY, in: inn, out, groups, txns };
  });
}
function topByBrand(txns) {
  const map = {};
  txns.forEach(t => {
    map[t.brandId] = map[t.brandId] || { brandId: t.brandId, brand: t.brand, total: 0, count: 0, last: t };
    map[t.brandId].total += Math.abs(t.amount);
    map[t.brandId].count += 1;
    if (t.day > map[t.brandId].last.day) map[t.brandId].last = t;
  });
  return Object.values(map).sort((a, b) => b.total - a.total);
}

    flag:     <g {...p}><path d="M6 21V4" /><path d="M6 5c4-2.4 8 2.4 12 0v9c-4 2.4-8-2.4-12 0" fill={stroke} stroke="none" /></g>,

}

/* UAE Dirham symbol (official mark), baseline-aligned */
function Dirham({ size = 14, color = 'currentColor', style = {} }) {
  const w = size * (344.84 / 299.91);
  return (
    <svg width={w} height={size} viewBox="0 0 344.84 299.91" fill={color} aria-label="AED"
      style={{ display: 'inline-block', verticalAlign: '-0.02em', flexShrink: 0, ...style }}>
      <path d="M342.14,140.96l2.7,2.54v-7.72c0-17-11.92-30.84-26.56-30.84h-23.41C278.49,36.7,222.69,0,139.68,0c-52.86,0-59.65,0-109.71,0,0,0,15.03,12.63,15.03,52.4v52.58h-27.68c-5.38,0-10.43-2.08-14.61-6.01l-2.7-2.54v7.72c0,17.01,11.92,30.84,26.56,30.84h18.44s0,29.99,0,29.99h-27.68c-5.38,0-10.43-2.07-14.61-6.01l-2.7-2.54v7.71c0,17,11.92,30.82,26.56,30.82h18.44s0,54.89,0,54.89c0,38.65-15.03,50.06-15.03,50.06h109.71c85.62,0,139.64-36.96,155.38-104.98h32.46c5.38,0,10.43,2.07,14.61,6l2.7,2.54v-7.71c0-17-11.92-30.83-26.56-30.83h-18.9c.32-4.88.49-9.87.49-15s-.18-10.11-.51-14.99h28.17c5.37,0,10.43,2.07,14.61,6.01ZM89.96,15.01h45.86c61.7,0,97.44,27.33,108.1,89.94l-153.96.02V15.01ZM136.21,284.93h-46.26v-89.98l153.87-.02c-9.97,56.66-42.07,88.38-107.61,90ZM247.34,149.96c0,5.13-.11,10.13-.23,14.99l-157.04.02v-29.99l157.05-.02c.22,4.84.33,9.83.33,15Z"/>
    </svg>
  );
}
function Amount({ value, size = 20, color = T.ink, sign, dsize }) {
  return (
    <span className="num" style={{ display: 'inline-flex', alignItems: 'baseline', gap: size * 0.28, color, fontWeight: 700, fontSize: size, fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.01em' }}>
      {sign && <span style={{ fontWeight: 700 }}>{sign}</span>}
      <Dirham size={dsize || size * 0.72} color={color} />
      {fmtAED(Math.abs(value))}
    </span>
  );
}

/* brand monogram (crisp everywhere — no blurry logo assets) */

/* ── charts ─────────────────────────────────────────────────────── */
function niceMax(v) { const s = Math.pow(10, Math.floor(Math.log10(v || 1))); return Math.ceil(v / s) * s; }

function TrendBars({ items, sel, onPick, height = 150, slot = 40 }) {
  const scroller = useRef(null);
  useEffect(() => { if (scroller.current) scroller.current.scrollLeft = scroller.current.scrollWidth; }, [items.length]);
  const max = niceMax(Math.max(...items.map(it => it.total), 1));
  return (
    <div ref={scroller} className="cf-scroll" style={{ overflowX: 'auto', margin: '0 -4px', padding: '0 4px' }}>
      <div style={{ display: 'flex', gap: 6, borderBottom: `1px solid ${T.line}`, minWidth: '100%', width: items.length * (slot + 6) }}>
        {items.map((it, i) => {
          const lit = sel === i, dim = sel != null && !lit;
          const yy = String(it.y).slice(2);
          const showYear = i === 0 || it.m === 0;
          return (
            <div key={i} {...pressable(() => onPick && onPick(lit ? null : i))}
              aria-label={`${MONTH_NAMES[it.m]} ${it.y}${it.mtd ? ' so far' : ''}: ${fmtAED(it.total)}`}
              style={{ width: slot, flexShrink: 0, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', alignItems: 'center', cursor: onPick ? 'pointer' : 'default', borderRadius: 8, background: lit ? T.faint : 'transparent', transition: 'background .18s', paddingBottom: 0 }}>
              <span className="num" style={{ fontSize: 10.5, fontWeight: 600, color: lit ? T.ink : T.muted2, marginBottom: 3, whiteSpace: 'nowrap' }}>{it.total ? fmtK(it.total) : ''}</span>
              <div style={{ width: 26, display: 'flex', flexDirection: 'column-reverse', borderRadius: 5, overflow: 'hidden', height: Math.max(it.total ? 3 : 2, (it.total / max) * height), background: it.total ? 'transparent' : T.grid, opacity: dim ? 0.35 : 1, transition: 'opacity .18s', transformOrigin: 'bottom', animation: `growY .5s cubic-bezier(.22,1,.36,1) ${Math.min(i * 0.03, 0.5)}s both` }}>
                {it.parts.map(pt => pt.value > 0 && <div key={pt.key} style={{ height: `${(pt.value / it.total) * 100}%`, background: pt.color }} />)}
              </div>
              <span className="num" style={{ fontSize: 10.5, fontWeight: lit ? 700 : 500, color: lit ? T.ink : T.muted2, margin: '5px 0 7px', whiteSpace: 'nowrap' }}>{showYear ? `${MONTH_ABBR[it.m]} ’${yy}` : MONTH_ABBR[it.m]}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* donut with icon chips on the ring (like the Figma breakdown) */
function Donut({ segments, total, centerLabel }) {
  const R = 74, SW = 10, C = 2 * Math.PI * R;
  const size = 2 * (R + 26);
  let acc = 0;
  const arcs = segments.map(s => {
    const frac = s.value / total;
    const a = { ...s, start: acc, frac };
    acc += frac;
    return a;
  });
  const GAP = 0.012;
  return (
    <div style={{ position: 'relative', width: size, height: size, margin: '0 auto' }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: 'rotate(-90deg)' }}>
        {arcs.map(a => (
          <circle key={a.key} cx={size / 2} cy={size / 2} r={R} fill="none"
            stroke={a.color} strokeWidth={SW} strokeLinecap="round"
            strokeDasharray={`${Math.max(0.001, (a.frac - GAP)) * C} ${C}`}
            strokeDashoffset={-a.start * C} />
        ))}
      </svg>
      {arcs.map(a => {
        const mid = (a.start + a.frac / 2) * 2 * Math.PI - Math.PI / 2;
        const x = size / 2 + Math.cos(mid) * R, y = size / 2 + Math.sin(mid) * R;
        return (
          <div key={a.key} style={{ position: 'absolute', left: x, top: y, transform: 'translate(-50%,-50%)', width: 26, height: 26, borderRadius: 8, background: '#fff', boxShadow: '0 1px 4px rgba(0,0,0,0.14)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ width: 22, height: 22, borderRadius: 6, background: hexA(a.color, 0.16), display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name={a.glyph} size={13} stroke={a.color} sw={2.2} />
            </span>
          </div>
        );
      })}
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2 }}>
        <span style={{ fontSize: 12, fontWeight: 500, color: T.muted }}>{centerLabel}</span>
        <Amount value={total} size={22} color={T.ink} />
      </div>
    </div>
  );
}
function DonutLegend({ segments }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px 16px', marginTop: 14 }}>

}

/* landing area sparkline */
function AreaSpark({ points, color = T.green, width = 132, height = 64 }) {
  const max = Math.max(...points, 1), min = Math.min(...points, 0);
  const xs = points.map((p, i) => [ (i / (points.length - 1)) * width, height - 6 - ((p - min) / (max - min || 1)) * (height - 16) ]);
  const line = xs.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
      <defs><linearGradient id="spark" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={hexA(color, 0.25)} /><stop offset="100%" stopColor={hexA(color, 0)} /></linearGradient></defs>
      <path d={`${line} L${width},${height} L0,${height} Z`} fill="url(#spark)" />
      <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" />
      {xs.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r={i === xs.length - 1 ? 3.2 : 2.2} fill={color} />)}
    </svg>
  );
}

/* ── inflow / outflow sheet (one component, two directions) ─────── */
function FlowSheet({ dir, period, activeCards, onClose, onOpenPeriod, onOpenEntity, onOpenTxn }) {
  const led = useLedger(period, activeCards);
  const inflow = dir === 'in';
  const groups = inflow ? IN_GROUPS : OUT_GROUPS;
  const txns = inflow ? led.inflow : led.outflow;
  const total = inflow ? led.inTotal : led.outTotal;

  const segs = groups.map(g => ({ ...g, value: txns.filter(t => t.brand.group === g.key).reduce((a, t) => a + Math.abs(t.amount), 0) })).filter(s => s.value > 0);
  const tops = topByBrand(txns);
  const recurring = tops.filter(t => t.brand.freq !== 'Occasional').length;

  return (
    <Sheet title={inflow ? 'Inflow' : 'Outflow'} onClose={onClose}>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 10, marginTop: 4 }}>
        <div>
          <Amount value={total} size={28} color={inflow ? T.green : T.redText} sign={inflow ? '' : '−'} />
          <div style={{ fontSize: 12.5, fontWeight: 500, color: T.muted, marginTop: 5 }}>
            {txns.length === 0 ? 'No transactions this period'

function SegToggle({ value, onSet, options }) {
  return (
    <div style={{ display: 'flex', background: T.sunken, borderRadius: 11, padding: 3 }}>
      {options.map(o => {
        const active = value === o.value;
        return (
          <button key={o.value} onClick={() => onSet(o.value)} className="cf-press" style={{
            flex: 1, border: 'none', cursor: 'pointer', borderRadius: 8, padding: '9px 0',
            background: active ? '#fff' : 'transparent', color: active ? T.ink : T.muted,
            fontSize: 13, fontWeight: 600, boxShadow: active ? '0 1px 3px rgba(7,3,18,0.10)' : 'none',
            transition: 'background .18s, color .18s',
          }}>{o.label}</button>
        );
      })}
    </div>
  );
}
function TrendsSheet({ activeCards, onClose }) {
  const hist = useMemo(() => historySeries(activeCards), [activeCards]);
  const [tab, setTabRaw] = useState('in');
  const [sel, setSel] = useState(null);
  const setTab = (t) => { setTabRaw(t); setSel(null); };
  const inflow = tab === 'in';
  const groups = inflow ? IN_GROUPS : OUT_GROUPS;

  const items = hist.map(s => ({
    y: s.y, m: s.m, mtd: s.mtd, s,
    total: inflow ? s.in : s.out,
    parts: groups.map(g => ({ key: g.key, color: g.color, value: s.groups[g.key] || 0 }))
      .filter(pt => (inflow ? IN_GROUPS : OUT_GROUPS).some(g => g.key === pt.key)),
  }));
  const first = hist[0], last = hist[hist.length - 1];
  const rangeLabel = `${MONTH_ABBR[first.m]} ’${String(first.y).slice(2)} – ${MONTH_ABBR[last.m]} ’${String(last.y).slice(2)}`;
  const grand = items.reduce((a, it) => a + it.total, 0);
  const fullTotals = items.filter(it => !it.mtd).map(it => it.total);
  const lowest = Math.min(...fullTotals), highest = Math.max(...fullTotals);
  const average = fullTotals.reduce((a, b) => a + b, 0) / fullTotals.length;
  const peak = items.filter(it => !it.mtd).reduce((a, b) => (b.total > a.total ? b : a));
  const variancePct = Math.round(Math.max(...fullTotals.map(t => Math.abs(t - average))) / average * 100);
  const m = sel != null ? items[sel] : null;

  return (
    <Sheet title="Trends" onClose={onClose}>
      <SegToggle value={tab} onSet={setTab} options={[{ value: 'in', label: 'Inflow' }, { value: 'out', label: 'Outflow' }]} />

      <Card style={{ padding: 16, marginTop: 14 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div key={tab} style={{ animation: 'fadeSwap .28s ease both' }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: T.muted }}>{inflow ? 'Total inflow' : 'Total outflow'}</div>
            <div style={{ marginTop: 4 }}><Amount value={grand} size={24} color={T.ink} /></div>
            <div style={{ fontSize: 12, fontWeight: 500, color: T.muted, marginTop: 4 }}>All time · {rangeLabel}</div>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 5, alignItems: 'flex-end' }}>
            {groups.map(g => (
              <span key={g.key} style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 11, fontWeight: 500, color: T.muted2 }}><Dot color={g.color} size={8} /> {g.label}</span>
            ))}
          </div>
        </div>

        <div style={{ display: 'flex', gap: 18, margin: '16px 0 14px' }}>
          {[['Lowest', lowest], ['Average', average], ['Highest', highest]].map(([lab, v]) => (
            <div key={lab}>
              <div style={{ fontSize: 11.5, fontWeight: 500, color: T.muted }}>{lab} / month</div>
              <Amount value={v} size={14} color={T.ink2} />
            </div>
          ))}
        </div>

        <TrendBars items={items} sel={sel} onPick={setSel} />

        <div key={sel == null ? 'hint' : `${tab}-${sel}`} style={{ marginTop: 12, animation: 'fadeSwap .25s ease both' }}>
          {m == null ? (
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, color: T.muted2, padding: '4px 0' }}>
              <Icon name="tap" size={15} stroke={T.muted2} sw={1.7} />
              <span style={{ fontSize: 12.5, fontWeight: 500 }}>Tap a month to see its details</span>
            </div>
          ) : (() => {
            const kept = m.s.in - m.s.out;
            const groupTotal = m.parts.reduce((a, pt) => a + pt.value, 0);
            const delta = !m.mtd && average > 0 ? Math.round(((m.total - average) / average) * 100) : null;
            return (
              <div style={{ background: T.sunken, borderRadius: 12, padding: '13px 14px' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: T.ink }}>{MONTH_NAMES[m.m]} {m.y}{m.mtd ? ' · so far' : ''}</span>
                  <span className="num" style={{ fontSize: 12, fontWeight: 700, color: kept >= 0 ? T.green : T.redText, background: kept >= 0 ? T.greenChip : T.redChip, borderRadius: 999, padding: '3px 10px', whiteSpace: 'nowrap' }}>
                    kept {kept >= 0 ? '' : '−'}{fmtK(Math.abs(kept))}
                  </span>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginTop: 11 }}>
                  {m.parts.filter(pt => pt.value > 0).map(pt => {
                    const grp = groups.find(g => g.key === pt.key);
                    return (
                      <div key={pt.key} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <Dot color={pt.color} size={8} />
                        <span style={{ fontSize: 12.5, fontWeight: 500, color: T.ink2, flex: 1 }}>{grp.label}</span>
                        <span className="num" style={{ fontSize: 12, fontWeight: 500, color: T.muted2, width: 38, textAlign: 'right' }}>{Math.round((pt.value / groupTotal) * 100)}%</span>
                        <span style={{ width: 78, display: 'flex', justifyContent: 'flex-end' }}><Amount value={pt.value} size={12.5} color={T.ink} dsize={9.5} /></span>
                      </div>
                    );
                  })}
                </div>
                <div style={{ height: 1, background: T.line, margin: '11px 0 9px' }} />
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8, flexWrap: 'wrap' }}>
                  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 12, fontWeight: 500, color: T.muted2 }}>
                    In <Amount value={m.s.in} size={12} color={T.ink2} dsize={9} /> · Out <Amount value={m.s.out} size={12} color={T.ink2} dsize={9} />
                  </span>
                  {delta != null && (
                    <span className="num" style={{ fontSize: 11.5, fontWeight: 600, color: T.muted2, whiteSpace: 'nowrap' }}>
                      {delta === 0 ? 'on your monthly average' : `${Math.abs(delta)}% ${delta > 0 ? 'above' : 'below'} your average`}
                    </span>
                  )}
                </div>
              </div>
            );
          })()}
        </div>
        <div style={{ fontSize: 11.5, color: T.muted2, fontWeight: 500, marginTop: 10 }}>* {MONTH_ABBR[NOW.m]} ’{String(NOW.y).slice(2)} is month-to-date (1–{NOW.d})</div>

        {inflow
          ? <InsightBanner tone="green" icon="repeat">Income varied ±{variancePct}% across {fullTotals.length} full months — your salary lands every month.</InsightBanner>
          : <InsightBanner tone="red" icon="trendUp">Spending peaked in {MONTH_NAMES[peak.m]} {peak.y}, mainly due to higher everyday and commitment expenses.</InsightBanner>}
      </Card>
    </Sheet>
  );
}

      <div style={{ display: 'flex', gap: 8, marginTop: 12, flexWrap: 'wrap' }}>
        <PeriodChip period={period} onOpen={() => open({ kind: 'period' })} />
        <CardChip activeCards={activeCards} onOpen={() => open({ kind: 'cards' })} />
      </div>

      {empty ? (
        <Card style={{ marginTop: 16 }}>
          <EmptyState
            title="No activity in this period"
            body={`No transactions on the selected cards for ${periodLabel(period)}. Pick another period, or check your card selection.`}
            cta="Choose period" onCta={() => open({ kind: 'period' })}
          />
        </Card>
      ) : (
        <React.Fragment>
          <Card style={{ marginTop: 16, padding: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: T.muted }}>Total cashflow</div>
            <div style={{ marginTop: 6, animation: 'fadeSwap .3s ease both' }} key={periodLabel(period) + led.net}>
              <Amount value={led.net} size={30} color={led.net >= 0 ? T.ink : T.redText} sign={led.net < 0 ? '−' : ''} />
            </div>
            <div style={{ fontSize: 12, fontWeight: 500, color: T.muted, marginTop: 4 }}>Inflow minus outflow · {periodLabel(period)}</div>
            <div style={{ display: 'flex', gap: 10, marginTop: 14 }}>
              <FlowTile dir="in" total={led.inTotal} count={led.inflow.length} onOpen={() => open({ kind: 'flow', dir: 'in' })} />
              <FlowTile dir="out" total={led.outTotal} count={led.outflow.length} onOpen={() => open({ kind: 'flow', dir: 'out' })} />
            </div>
          </Card>

          <div style={{ display: 'flex', alignItems: 'center', gap: 12, background: T.keptPanel, borderRadius: 14, padding: '14px 14px', marginTop: 14 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: T.ink }}>Cashflow history</div>
              <div style={{ fontSize: 12, fontWeight: 500, color: T.muted, marginTop: 3, lineHeight: 1.5 }}>See how your inflow and outflow changed over time.</div>
            </div>
            <button onClick={() => open({ kind: 'trends' })} className="cf-press" style={{ background: T.green, color: '#fff', border: 'none', borderRadius: 10, padding: '11px 14px', fontSize: 13, fontWeight: 600, cursor: 'pointer', flexShrink: 0 }}>View trends</button>
          </div>

          <h2 style={{ margin: '22px 0 10px', fontSize: 17, fontWeight: 700, color: T.ink3 }}>Smart insights</h2>

          <Card style={{ padding: 16 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ width: 22, height: 22, borderRadius: 999, background: T.green, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="check" size={12} stroke="#fff" sw={2.6} /></span>
              <span style={{ fontSize: 14.5, fontWeight: 700, color: T.ink }}>Cashflow summary</span>
            </div>
            <div style={{ display: 'flex', gap: 14, alignItems: 'flex-end', marginTop: 10 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 12.5, fontWeight: 500, color: T.muted }}>Total cashflow</div>
                <div style={{ marginTop: 2 }}><Amount value={led.net} size={21} color={led.net >= 0 ? T.green : T.redText} /></div>
                <div style={{ fontSize: 12, fontWeight: 500, color: T.muted, marginTop: 5, lineHeight: 1.5 }}>
                  You’ve {led.net >= 0 ? 'earned' : 'spent'} <span className="num" style={{ fontWeight: 700 }}>{fmtAED(Math.abs(led.net))} AED</span> more than you {led.net >= 0 ? 'spent' : 'earned'} this period
                </div>
              </div>
              <AreaSpark points={surplusSeries} color={led.net >= 0 ? T.green : T.red} />
            </div>
          </Card>

          <Card style={{ padding: 16, marginTop: 12 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ width: 22, height: 22, borderRadius: 999, background: T.blue, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="shield" size={12} stroke="#fff" sw={2.2} /></span>
              <span style={{ fontSize: 14.5, fontWeight: 700, color: T.ink }}>Financial cushion</span>
            </div>
            {cushion == null ? (
              <div style={{ fontSize: 12.5, fontWeight: 500, color: T.muted, marginTop: 10, lineHeight: 1.55 }}>
                No expenses recorded this period, so there is nothing to cover — your whole inflow is surplus.
              </div>
            ) : (
              <React.Fragment>
                <div style={{ fontSize: 12.5, fontWeight: 500, color: T.muted, marginTop: 10 }}>Expenses coverage</div>
                <div className="num" style={{ fontSize: 21, fontWeight: 700, color: T.blue, marginTop: 2 }}>{cushion.toFixed(2)}x</div>
                <div style={{ position: 'relative', height: 22, background: T.sunken, borderRadius: 6, marginTop: 10, overflow: 'hidden' }}>
                  <div style={{ position: 'absolute', inset: '3px auto 3px 3px', width: `${Math.min(100, (cushion / 3) * 100)}%`, background: T.blue, borderRadius: 4, transformOrigin: 'left', animation: 'growX .55s cubic-bezier(.22,1,.36,1) both' }} />
                </div>
                <div className="num" style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, fontWeight: 500, color: T.muted2, marginTop: 5 }}>
                  {['0x', '1x', '2x', '3x'].map(t => <span key={t}>{t}</span>)}
                </div>
                <div style={{ fontSize: 12, fontWeight: 500, color: T.muted, marginTop: 8 }}>
                  {cushion >= 1
                    ? <span>Your income covers <span className="num" style={{ fontWeight: 700 }}>{Math.round(cushion * 100)}%</span> of your expenses this period</span>
                    : 'Your expenses exceed your income this period'}
                </div>
              </React.Fragment>
            )}
          </Card>
        </React.Fragment>
      )}
    </div>
  );
}

/* ── device chrome ──────────────────────────────────────────────── */

  const c = '#101010';
  return (
    <div style={{ height: 52, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 28px 0 34px', position: 'absolute', top: 0, left: 0, right: 0, zIndex: 40, pointerEvents: 'none' }}>
      <span className="num" style={{ fontSize: 16, fontWeight: 600, color: c, letterSpacing: '-0.02em' }}>9:41</span>
      <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
        <svg width="18" height="12" viewBox="0 0 18 12"><g fill={c}><rect x="0" y="7" width="3" height="5" rx="1" /><rect x="5" y="4.5" width="3" height="7.5" rx="1" /><rect x="10" y="2" width="3" height="10" rx="1" /><rect x="15" y="0" width="3" height="12" rx="1" /></g></svg>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 3.2c2 0 3.8.8 5.2 2.1M8.5 3.2C6.5 3.2 4.7 4 3.3 5.3M8.5 7c1 0 1.9.4 2.6 1M8.5 7c-1 0-1.9.4-2.6 1" stroke={c} strokeWidth="1.5" strokeLinecap="round" /><circle cx="8.5" cy="10.3" r="1" fill={c} /></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="1" width="21" height="10" rx="3" fill="none" stroke={c} strokeOpacity="0.4" /><rect x="2" y="2.5" width="17" height="7" rx="1.5" fill={c} /><rect x="23" y="4" width="2" height="4" rx="1" fill={c} fillOpacity="0.5" /></svg>
      </div>

/* ── flow-notes panel (maps prototype decisions → PRD issues) ───── */
const NOTES = [
  ['Date first', 'The period control sits at the top of the landing screen; every figure on every screen derives from it. Fixes "amount shown before the period is chosen".'],
  ['One data model', 'Donut, trend, timeline, tops and lists all sum the same transactions — totals can no longer contradict each other (Figma: ₯5,760 total vs 4,326 surplus; donut 23.8K vs 19,240 spend).'],
  ['Valid month labels', 'Trends uses whole calendar months ("Feb 1–28", "Jul 1–21 · so far"). Figma shows "Feb 1st – 31st" and a 15 Jan–14 Jun range over monthly bars.'],
  ['One scope per screen', 'Trend charts no longer sit inside period-scoped Inflow/Outflow sheets. The sheets are pure snapshots of the chosen period; all over-time views live on the Trends surface (renamed from Timeline), which shows all history with an Inflow/Outflow toggle in the breakdown palettes.'],
  ['Presets + year picker', '"This month / Last month / 3 / 6 months" one tap away, plus a month grid with year stepper. Fixes the funnel-icon detour and missing year selection.'],
  ['Tap affordances', 'Every drillable row has a chevron and press state (inflow/outflow tiles, sources, merchants, transactions).'],
  ['Empty states', 'Landing and both sheets have an empty state with a recovery action (pick a period with no data to see it).'],
  ['Copy fixes', '"Last received" (not "recieved"), raw descriptions match the merchant, scope labels always say which window they cover.'],
];
function NotesPanel() {
  const [openIdx, setOpenIdx] = useState(0);
  return (
    <div style={{ width: 300, alignSelf: 'flex-start', flexShrink: 0, background: 'rgba(255,255,255,0.85)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', borderRadius: 18, padding: 18, boxShadow: '0 8px 30px rgba(0,0,0,0.12)', border: '0.5px solid rgba(0,0,0,0.08)' }}>
      <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em', color: '#8a8a8a', marginBottom: 4 }}>Flow fixes vs Figma</div>
      <div style={{ fontSize: 12, color: '#6b6b6b', fontWeight: 500, lineHeight: 1.5, marginBottom: 10 }}>Each item below maps to an issue for the design-team PRD.</div>
      {NOTES.map(([t, body], i) => (
        <div key={t} style={{ borderTop: '1px solid rgba(0,0,0,0.07)' }}>
          <button onClick={() => setOpenIdx(openIdx === i ? -1 : i)} style={{ width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: 'none', border: 'none', padding: '10px 0', cursor: 'pointer' }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: '#29261b' }}>{i + 1}. {t}</span>
            <Icon name="chevD" size={14} stroke="#8a8a8a" sw={2.2} />
          </button>
          {openIdx === i && <p style={{ margin: '0 0 12px', fontSize: 12, color: '#5f5f5f', fontWeight: 500, lineHeight: 1.55 }}>{body}</p>}
        </div>
      ))}
    </div>
  );
}

/* ── app: sheet stack navigation ────────────────────────────────── */
function App() {
  const [period, setPeriod] = useState({ preset: 'last', months: PRESETS[1].months() });
  const [activeCards, setActiveCards] = useState(new Set(CARDS.map(c => c.id)));
  const [stack, setStack] = useState([]);          // sheets, bottom → top
  const push = (s) => setStack(x => [...x, s]);
  const pop = () => setStack(x => x.slice(0, -1));
  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') setStack(x => x.slice(0, -1)); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  const render = (s, i) => {
    const common = { key: i, onClose: pop };
    switch (s.kind) {
      case 'period':   return <PeriodSheet {...common} period={period} onSet={setPeriod} />;
      case 'cards':    return <CardsSheet {...common} activeCards={activeCards} onSet={setActiveCards} />;
      case 'trends':   return <TrendsSheet {...common} activeCards={activeCards} />;
      case 'flow':     return <FlowSheet {...common} dir={s.dir} period={period} activeCards={activeCards}
                          onOpenPeriod={() => push({ kind: 'period' })}
                          onOpenEntity={(top) => push({ kind: 'entity', top, dir: s.dir })}
                          onOpenTxn={(t) => push({ kind: 'txn', t })} />;
      case 'entity':   return <EntityDetailSheet {...common} entity={s.top} dir={s.dir} activeCards={activeCards}
                          onOpenTxn={(t) => push({ kind: 'txn', t })} />;
      case 'txn':      return <TxnDetailSheet {...common} txn={s.t} />;
      default: return null;
    }
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 32, flexWrap: 'wrap', background: '#E2E8E6', padding: 24 }}>
      <div style={{ width: 390, height: 844, borderRadius: 48, overflow: 'hidden', position: 'relative', background: T.bg, boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)' }}>
        <div style={{ position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)', width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50 }} />
        <StatusBar />
        <Landing period={period} activeCards={activeCards} open={push} />
        {stack.map(render)}
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60, height: 30, display: 'flex', justifyContent: 'center', alignItems: 'flex-end', paddingBottom: 8, pointerEvents: 'none' }}>
          <div style={{ width: 139, height: 5, borderRadius: 100, background: 'rgba(0,0,0,0.28)' }} />
        </div>
      </div>
      <NotesPanel />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
