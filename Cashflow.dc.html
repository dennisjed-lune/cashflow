<!-- Design tokens, reset & base styles (from the Lune design system / Cashflow.dc helmet) -->
<style>
/* ============================================================
   Lune — Color tokens
   ------------------------------------------------------------
   Source of truth: Lune UI Library + Category Icons (Figma) and
   the Lune logo suite. Primary is emerald #10A37F (the crescent),
   anchored by deep teal #002E2A and the near-black "ink" #070312.
   ============================================================ */

:root {
  /* ---- Brand core ---- */
  --lune-emerald:      #10A37F;  /* primary — the crescent / accent */
  --lune-teal:         #002E2A;  /* deep forest teal — wordmark, dark surfaces */
  --lune-teal-700:     #0A634D;  /* mid teal — category-icon green */
  --lune-mint:         #99F2AC;  /* bright mint — success, highlights */
  --lune-ink:          #070312;  /* near-black aubergine — dark canvas */
  --lune-sea:          #469A93;  /* muted sea green — secondary accent */

  /* ---- Emerald ramp (primary, from Figma opacity steps) ---- */
  --primary-100:       #10A37F;
  --primary-90:        rgba(16,163,127,0.90);
  --primary-80:        rgba(16,163,127,0.80);
  --primary-70:        rgba(16,163,127,0.70);
  --primary-60:        rgba(16,163,127,0.60);
  --primary-50:        rgba(16,163,127,0.50);
  --primary-40:        rgba(16,163,127,0.40);
  --primary-30:        rgba(16,163,127,0.30);
  --primary-20:        rgba(16,163,127,0.20);
  --primary-10:        rgba(16,163,127,0.10);

  /* ---- Neutral ramp (cool, faintly teal-tinted greys) ---- */
  --neutral-0:         #FFFFFF;
  --neutral-25:        #F7F9F8;
  --neutral-50:        #EEF2F1;
  --neutral-100:       #E2E8E6;
  --neutral-200:       #C9D3D0;
  --neutral-300:       #A7B4B0;
  --neutral-400:       #7E8E89;
  --neutral-500:       #5C6B66;
  --neutral-600:       #44524E;
  --neutral-700:       #2E3A36;
  --neutral-800:       #1B2421;
  --neutral-900:       #0E1513;
  --neutral-950:       #070312;

  /* ---- Status (from the Figma status-pill set) ---- */
  --status-success:    #99F2AC;  /* "Completed" */
  --status-success-ink:#063D1B;
  --status-warning:    #FBDA7D;  /* "Under Review" */
  --status-warning-ink:#5A4205;
  --status-info:       #5A9CB5;  /* informational (category palette) */
  --status-info-ink:   #0C3543;
  --status-error:      #F26076;  /* declined / error (category palette) */
  --status-error-ink:  #5C0C18;

  /* ---- Category accent hues (from Category Icons "Colours") ---- */
  --cat-dining:        #FF7444;
  --cat-grocery:       #E76F2E;
  --cat-shopping:      #F26076;
  --cat-wellness:      #F49BAB;
  --cat-transport:     #5A9CB5;
  --cat-travel:        #6F8F72;
  --cat-financial:     #3852B4;
  --cat-savings:       #A594F9;
  --cat-income:        #0A634D;
  --cat-household:     #C4A484;
  --cat-student:       #B7BDF7;
  --cat-misc:          #758A93;

  /* ============================================================
     Semantic aliases — light theme (default)
     ============================================================ */
  --bg-canvas:         var(--neutral-25);
  --bg-surface:        var(--neutral-0);
  --bg-raised:         var(--neutral-0);
  --bg-sunken:         var(--neutral-50);
  --bg-inverse:        var(--lune-ink);

  --surface-card:      var(--neutral-0);
  --surface-muted:     var(--neutral-50);
  --surface-emerald:   var(--primary-10);

  --text-primary:      var(--lune-teal);
  --text-secondary:    var(--neutral-600);
  --text-tertiary:     var(--neutral-400);
  --text-on-emerald:   var(--neutral-0);
  --text-on-inverse:   var(--neutral-0);
  --text-link:         var(--lune-emerald);

  --border-subtle:     var(--neutral-100);
  --border-default:    var(--neutral-200);
  --border-strong:     var(--neutral-300);
  --border-emerald:    var(--lune-emerald);

  --accent:            var(--lune-emerald);
  --accent-hover:      #0E9173;
  --accent-press:      #0B7C62;
  --focus-ring:        rgba(16,163,127,0.35);
}

/* ============================================================
   Dark theme — set data-theme="dark" on a wrapper or <html>
   The Lune cover/cover-page use the ink canvas with white type
   and emerald accents.
   ============================================================ */
[data-theme="dark"] {
  --bg-canvas:         var(--lune-ink);
  --bg-surface:        #110B1F;
  --bg-raised:         #181023;
  --bg-sunken:         #0B0716;
  --bg-inverse:        var(--neutral-0);

  --surface-card:      #14101F;
  --surface-muted:     #1B1528;
  --surface-emerald:   rgba(16,163,127,0.16);

  --text-primary:      var(--neutral-0);
  --text-secondary:    #B8B2C4;
  --text-tertiary:     #7C7689;
  --text-on-emerald:   var(--lune-ink);
  --text-on-inverse:   var(--lune-teal);
  --text-link:         var(--lune-mint);

  --border-subtle:     rgba(255,255,255,0.08);
  --border-default:    rgba(255,255,255,0.14);
  --border-strong:     rgba(255,255,255,0.24);
  --border-emerald:    var(--lune-emerald);

  --accent:            var(--lune-emerald);
  --accent-hover:      #2BB996;
  --accent-press:      #46A893;
  --focus-ring:        rgba(153,242,172,0.40);
}


/* ============================================================
   Lune — Typography tokens
   ------------------------------------------------------------
   Type scale lifted directly from the Lune UI Library type spec.
   Body family: Plus Jakarta Sans. Display: Cormorant Garamond
   (Bold Italic — reserved for hero / editorial moments).
   Every step is set at 150% line-height per the spec, except the
   display face which runs tight at 100%.
   ============================================================ */

:root {
  /* ---- Families ---- */
  --font-sans: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont,
               "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-display: "Cormorant Garamond", ui-serif, Georgia,
                  "Times New Roman", serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  /* ---- Weights ---- */
  --weight-regular: 400;
  --weight-medium:  500;
  --weight-semibold:600;
  --weight-bold:    700;
  --weight-extra:   800;

  /* ---- Type scale (px) — name : size / line-height ---- */
  --text-h1-size: 36px;   --text-h1-lh: 1.5;
  --text-h2-size: 32px;   --text-h2-lh: 1.5;
  --text-h3-size: 28px;   --text-h3-lh: 1.5;
  --text-h4-size: 24px;   --text-h4-lh: 1.5;
  --text-h5-size: 20px;   --text-h5-lh: 1.5;
  --text-title1-size: 18px; --text-title1-lh: 1.5;
  --text-title2-size: 16px; --text-title2-lh: 1.5;
  --text-body-size: 14px; --text-body-lh: 1.5;
  --text-caption-size: 12px; --text-caption-lh: 1.5;

  /* Display (Cormorant Garamond, Bold Italic, tight) */
  --text-display-size: 88px; --text-display-lh: 1.0;

  /* ---- Letter-spacing ---- */
  --tracking-tight: -0.02em;   /* large sans headings + hero */
  --tracking-normal: 0;
  --tracking-wide: 0.04em;     /* uppercase pill / eyebrow labels */
}

/* ============================================================
   Type helper classes — apply directly or use as reference.
   ============================================================ */
.lune-display {
  font-family: var(--font-display);
  font-weight: var(--weight-bold);
  font-style: italic;
  font-size: var(--text-display-size);
  line-height: var(--text-display-lh);
  letter-spacing: var(--tracking-tight);
}
.lune-h1 { font-family: var(--font-sans); font-weight: var(--weight-bold);
  font-size: var(--text-h1-size); line-height: var(--text-h1-lh); letter-spacing: var(--tracking-tight); }
.lune-h2 { font-family: var(--font-sans); font-weight: var(--weight-bold);
  font-size: var(--text-h2-size); line-height: var(--text-h2-lh); letter-spacing: var(--tracking-tight); }
.lune-h3 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-h3-size); line-height: var(--text-h3-lh); }
.lune-h4 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-h4-size); line-height: var(--text-h4-lh); }
.lune-h5 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-h5-size); line-height: var(--text-h5-lh); }
.lune-title1 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-title1-size); line-height: var(--text-title1-lh); }
.lune-title2 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-title2-size); line-height: var(--text-title2-lh); }
.lune-body { font-family: var(--font-sans); font-weight: var(--weight-regular);
  font-size: var(--text-body-size); line-height: var(--text-body-lh); }
.lune-caption { font-family: var(--font-sans); font-weight: var(--weight-regular);
  font-size: var(--text-caption-size); line-height: var(--text-caption-lh); }
.lune-eyebrow { font-family: var(--font-sans); font-weight: var(--weight-bold);
  font-size: var(--text-caption-size); line-height: 1; letter-spacing: var(--tracking-wide);
  text-transform: uppercase; }


/* ============================================================
   Lune — Spacing, radius, elevation & motion tokens
   ------------------------------------------------------------
   Spacing is a 4px base scale (Figma gaps observed: 8/20/24/32/48/64).
   Radii run from tight inputs up to the fully-rounded status pills
   (the Figma pills use a 72px radius = effectively pill-shaped).
   ============================================================ */

:root {
  /* ---- Spacing (4px base) ---- */
  --space-0:  0;
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  20px;
  --space-6:  24px;
  --space-8:  32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --space-20: 80px;
  --space-24: 96px;
  --space-32: 128px;

  /* ---- Radii ---- */
  --radius-xs:   4px;
  --radius-sm:   8px;
  --radius-md:   12px;   /* default control / card radius */
  --radius-lg:   16px;
  --radius-xl:   24px;
  --radius-2xl:  32px;
  --radius-pill: 999px;  /* status pills, chips, avatars */

  /* ---- Border widths ---- */
  --border-hairline: 1px;
  --border-thick:    1.5px;

  /* ---- Elevation — soft, cool-toned shadows (teal-tinted) ---- */
  --shadow-xs:  0 1px 2px rgba(7,3,18,0.06);
  --shadow-sm:  0 1px 3px rgba(7,3,18,0.08), 0 1px 2px rgba(7,3,18,0.04);
  --shadow-md:  0 4px 12px rgba(7,3,18,0.08), 0 2px 4px rgba(7,3,18,0.04);
  --shadow-lg:  0 12px 32px rgba(7,3,18,0.12), 0 4px 8px rgba(7,3,18,0.05);
  --shadow-xl:  0 24px 64px rgba(7,3,18,0.16);
  --shadow-emerald: 0 8px 24px rgba(16,163,127,0.28);

  /* ---- Motion ---- */
  --ease-standard: cubic-bezier(0.2, 0, 0, 1);   /* @kind other */
  --ease-emphasis: cubic-bezier(0.3, 0.7, 0, 1); /* @kind other */
  --ease-out:      cubic-bezier(0, 0, 0.2, 1);   /* @kind other */
  --dur-fast:   120ms;  /* @kind other */
  --dur-base:   200ms;  /* @kind other */
  --dur-slow:   320ms;  /* @kind other */

  /* ---- Layout ---- */
  --container-max: 1200px;
  --container-prose: 680px;
}


/* ============================================================
   Lune — base / reset layer
   A light, opinionated normalize that wires the brand defaults
   onto bare HTML. Optional for consumers but keeps specimens and
   UI kits consistent.
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }

html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: var(--text-body-size);
  line-height: var(--text-body-lh);
  font-weight: var(--weight-regular);
  color: var(--text-primary);
  background: var(--bg-canvas);
}

h1, h2, h3, h4, h5, h6, p, figure { margin: 0; }

a { color: var(--text-link); text-decoration: none; }
a:hover { text-decoration: underline; }

::selection { background: var(--lune-mint); color: var(--lune-teal); }

:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: var(--radius-xs);
}

img, svg { display: block; max-width: 100%; }

code, pre, kbd { font-family: var(--font-mono); }

@font-face {
  font-family: 'Plus Jakarta Sans';
  src: url("8e36f591-082a-4208-9803-b1c0b647f599") format('truetype-variations');
  font-weight: 200 800;
  font-style: italic;
  font-display: swap;
}

/* ============================================================
   Lune — Color tokens
   ------------------------------------------------------------
   Source of truth: Lune UI Library + Category Icons (Figma) and
   the Lune logo suite. Primary is emerald #10A37F (the crescent),
   anchored by deep teal #002E2A and the near-black "ink" #070312.
   ============================================================ */

:root {
  /* ---- Brand core ---- */
  --lune-emerald:      #10A37F;  /* primary — the crescent / accent */
  --lune-teal:         #002E2A;  /* deep forest teal — wordmark, dark surfaces */
  --lune-teal-700:     #0A634D;  /* mid teal — category-icon green */
  --lune-mint:         #99F2AC;  /* bright mint — success, highlights */
  --lune-ink:          #070312;  /* near-black aubergine — dark canvas */
  --lune-sea:          #469A93;  /* muted sea green — secondary accent */

  /* ---- Emerald ramp (primary, from Figma opacity steps) ---- */
  --primary-100:       #10A37F;
  --primary-90:        rgba(16,163,127,0.90);
  --primary-80:        rgba(16,163,127,0.80);
  --primary-70:        rgba(16,163,127,0.70);
  --primary-60:        rgba(16,163,127,0.60);
  --primary-50:        rgba(16,163,127,0.50);
  --primary-40:        rgba(16,163,127,0.40);
  --primary-30:        rgba(16,163,127,0.30);
  --primary-20:        rgba(16,163,127,0.20);
  --primary-10:        rgba(16,163,127,0.10);

  /* ---- Neutral ramp (cool, faintly teal-tinted greys) ---- */
  --neutral-0:         #FFFFFF;
  --neutral-25:        #F7F9F8;
  --neutral-50:        #EEF2F1;
  --neutral-100:       #E2E8E6;
  --neutral-200:       #C9D3D0;
  --neutral-300:       #A7B4B0;
  --neutral-400:       #7E8E89;
  --neutral-500:       #5C6B66;
  --neutral-600:       #44524E;
  --neutral-700:       #2E3A36;
  --neutral-800:       #1B2421;
  --neutral-900:       #0E1513;
  --neutral-950:       #070312;

  /* ---- Status (from the Figma status-pill set) ---- */
  --status-success:    #99F2AC;  /* "Completed" */
  --status-success-ink:#063D1B;
  --status-warning:    #FBDA7D;  /* "Under Review" */
  --status-warning-ink:#5A4205;
  --status-info:       #5A9CB5;  /* informational (category palette) */
  --status-info-ink:   #0C3543;
  --status-error:      #F26076;  /* declined / error (category palette) */
  --status-error-ink:  #5C0C18;

  /* ---- Category accent hues (from Category Icons "Colours") ---- */
  --cat-dining:        #FF7444;
  --cat-grocery:       #E76F2E;
  --cat-shopping:      #F26076;
  --cat-wellness:      #F49BAB;
  --cat-transport:     #5A9CB5;
  --cat-travel:        #6F8F72;
  --cat-financial:     #3852B4;
  --cat-savings:       #A594F9;
  --cat-income:        #0A634D;
  --cat-household:     #C4A484;
  --cat-student:       #B7BDF7;
  --cat-misc:          #758A93;

  /* ============================================================
     Semantic aliases — light theme (default)
     ============================================================ */
  --bg-canvas:         var(--neutral-25);
  --bg-surface:        var(--neutral-0);
  --bg-raised:         var(--neutral-0);
  --bg-sunken:         var(--neutral-50);
  --bg-inverse:        var(--lune-ink);

  --surface-card:      var(--neutral-0);
  --surface-muted:     var(--neutral-50);
  --surface-emerald:   var(--primary-10);

  --text-primary:      var(--lune-teal);
  --text-secondary:    var(--neutral-600);
  --text-tertiary:     var(--neutral-400);
  --text-on-emerald:   var(--neutral-0);
  --text-on-inverse:   var(--neutral-0);
  --text-link:         var(--lune-emerald);

  --border-subtle:     var(--neutral-100);
  --border-default:    var(--neutral-200);
  --border-strong:     var(--neutral-300);
  --border-emerald:    var(--lune-emerald);

  --accent:            var(--lune-emerald);
  --accent-hover:      #0E9173;
  --accent-press:      #0B7C62;
  --focus-ring:        rgba(16,163,127,0.35);
}

/* ============================================================
   Dark theme — set data-theme="dark" on a wrapper or <html>
   The Lune cover/cover-page use the ink canvas with white type
   and emerald accents.
   ============================================================ */
[data-theme="dark"] {
  --bg-canvas:         var(--lune-ink);
  --bg-surface:        #110B1F;
  --bg-raised:         #181023;
  --bg-sunken:         #0B0716;
  --bg-inverse:        var(--neutral-0);

  --surface-card:      #14101F;
  --surface-muted:     #1B1528;
  --surface-emerald:   rgba(16,163,127,0.16);

  --text-primary:      var(--neutral-0);
  --text-secondary:    #B8B2C4;
  --text-tertiary:     #7C7689;
  --text-on-emerald:   var(--lune-ink);
  --text-on-inverse:   var(--lune-teal);
  --text-link:         var(--lune-mint);

  --border-subtle:     rgba(255,255,255,0.08);
  --border-default:    rgba(255,255,255,0.14);
  --border-strong:     rgba(255,255,255,0.24);
  --border-emerald:    var(--lune-emerald);

  --accent:            var(--lune-emerald);
  --accent-hover:      #2BB996;
  --accent-press:      #46A893;
  --focus-ring:        rgba(153,242,172,0.40);
}

/* ============================================================
   Lune — Typography tokens
   ------------------------------------------------------------
   Type scale lifted directly from the Lune UI Library type spec.
   Body family: Plus Jakarta Sans. Display: Cormorant Garamond
   (Bold Italic — reserved for hero / editorial moments).
   Every step is set at 150% line-height per the spec, except the
   display face which runs tight at 100%.
   ============================================================ */

:root {
  /* ---- Families ---- */
  --font-sans: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont,
               "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-display: "Cormorant Garamond", ui-serif, Georgia,
                  "Times New Roman", serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  /* ---- Weights ---- */
  --weight-regular: 400;
  --weight-medium:  500;
  --weight-semibold:600;
  --weight-bold:    700;
  --weight-extra:   800;

  /* ---- Type scale (px) — name : size / line-height ---- */
  --text-h1-size: 36px;   --text-h1-lh: 1.5;
  --text-h2-size: 32px;   --text-h2-lh: 1.5;
  --text-h3-size: 28px;   --text-h3-lh: 1.5;
  --text-h4-size: 24px;   --text-h4-lh: 1.5;
  --text-h5-size: 20px;   --text-h5-lh: 1.5;
  --text-title1-size: 18px; --text-title1-lh: 1.5;
  --text-title2-size: 16px; --text-title2-lh: 1.5;
  --text-body-size: 14px; --text-body-lh: 1.5;
  --text-caption-size: 12px; --text-caption-lh: 1.5;

  /* Display (Cormorant Garamond, Bold Italic, tight) */
  --text-display-size: 88px; --text-display-lh: 1.0;

  /* ---- Letter-spacing ---- */
  --tracking-tight: -0.02em;   /* large sans headings + hero */
  --tracking-normal: 0;
  --tracking-wide: 0.04em;     /* uppercase pill / eyebrow labels */
}

/* ============================================================
   Type helper classes — apply directly or use as reference.
   ============================================================ */
.lune-display {
  font-family: var(--font-display);
  font-weight: var(--weight-bold);
  font-style: italic;
  font-size: var(--text-display-size);
  line-height: var(--text-display-lh);
  letter-spacing: var(--tracking-tight);
}
.lune-h1 { font-family: var(--font-sans); font-weight: var(--weight-bold);
  font-size: var(--text-h1-size); line-height: var(--text-h1-lh); letter-spacing: var(--tracking-tight); }
.lune-h2 { font-family: var(--font-sans); font-weight: var(--weight-bold);
  font-size: var(--text-h2-size); line-height: var(--text-h2-lh); letter-spacing: var(--tracking-tight); }
.lune-h3 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-h3-size); line-height: var(--text-h3-lh); }
.lune-h4 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-h4-size); line-height: var(--text-h4-lh); }
.lune-h5 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-h5-size); line-height: var(--text-h5-lh); }
.lune-title1 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-title1-size); line-height: var(--text-title1-lh); }
.lune-title2 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-title2-size); line-height: var(--text-title2-lh); }
.lune-body { font-family: var(--font-sans); font-weight: var(--weight-regular);
  font-size: var(--text-body-size); line-height: var(--text-body-lh); }
.lune-caption { font-family: var(--font-sans); font-weight: var(--weight-regular);
  font-size: var(--text-caption-size); line-height: var(--text-caption-lh); }
.lune-eyebrow { font-family: var(--font-sans); font-weight: var(--weight-bold);
  font-size: var(--text-caption-size); line-height: 1; letter-spacing: var(--tracking-wide);
  text-transform: uppercase; }

/* ============================================================
   Lune — Spacing, radius, elevation & motion tokens
   ------------------------------------------------------------
   Spacing is a 4px base scale (Figma gaps observed: 8/20/24/32/48/64).
   Radii run from tight inputs up to the fully-rounded status pills
   (the Figma pills use a 72px radius = effectively pill-shaped).
   ============================================================ */

:root {
  /* ---- Spacing (4px base) ---- */
  --space-0:  0;
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  20px;
  --space-6:  24px;
  --space-8:  32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --space-20: 80px;
  --space-24: 96px;
  --space-32: 128px;

  /* ---- Radii ---- */
  --radius-xs:   4px;
  --radius-sm:   8px;
  --radius-md:   12px;   /* default control / card radius */
  --radius-lg:   16px;
  --radius-xl:   24px;
  --radius-2xl:  32px;
  --radius-pill: 999px;  /* status pills, chips, avatars */

  /* ---- Border widths ---- */
  --border-hairline: 1px;
  --border-thick:    1.5px;

  /* ---- Elevation — soft, cool-toned shadows (teal-tinted) ---- */
  --shadow-xs:  0 1px 2px rgba(7,3,18,0.06);
  --shadow-sm:  0 1px 3px rgba(7,3,18,0.08), 0 1px 2px rgba(7,3,18,0.04);
  --shadow-md:  0 4px 12px rgba(7,3,18,0.08), 0 2px 4px rgba(7,3,18,0.04);
  --shadow-lg:  0 12px 32px rgba(7,3,18,0.12), 0 4px 8px rgba(7,3,18,0.05);
  --shadow-xl:  0 24px 64px rgba(7,3,18,0.16);
  --shadow-emerald: 0 8px 24px rgba(16,163,127,0.28);

  /* ---- Motion ---- */
  --ease-standard: cubic-bezier(0.2, 0, 0, 1);   /* @kind other */
  --ease-emphasis: cubic-bezier(0.3, 0.7, 0, 1); /* @kind other */
  --ease-out:      cubic-bezier(0, 0, 0.2, 1);   /* @kind other */
  --dur-fast:   120ms;  /* @kind other */
  --dur-base:   200ms;  /* @kind other */
  --dur-slow:   320ms;  /* @kind other */

  /* ---- Layout ---- */
  --container-max: 1200px;
  --container-prose: 680px;
}

/* ============================================================
   Lune — base / reset layer
   A light, opinionated normalize that wires the brand defaults
   onto bare HTML. Optional for consumers but keeps specimens and
   UI kits consistent.
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }

html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: var(--text-body-size);
  line-height: var(--text-body-lh);
  font-weight: var(--weight-regular);
  color: var(--text-primary);
  background: var(--bg-canvas);
}

h1, h2, h3, h4, h5, h6, p, figure { margin: 0; }

a { color: var(--text-link); text-decoration: none; }
a:hover { text-decoration: underline; }

::selection { background: var(--lune-mint); color: var(--lune-teal); }

:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: var(--radius-xs);
}

img, svg { display: block; max-width: 100%; }

code, pre, kbd { font-family: var(--font-mono); }

<!-- Cashflow module (window.CashflowApp) -->
<script type="text/babel" data-presets="react">
/* cashflow-app.jsx — Lune SDK · Cashflow module.
   Liquidity lens: Landing (in vs out vs net) → Outflow + Inflow.
   Restyled to match the Lune Expenses module — same theme tokens, real
   Lune category glyphs, donut breakdown, merchant logos & iOS frame.
   Mounted by Cashflow.dc.html via <x-import>. Props: accent, dark, showLogos. */

const { useState, useRef, useEffect } = React;

/* ── helpers ─────────────────────────────────────────────────────── */
function fmtAED(n, dec = false) {
  const v = dec ? Number(n).toFixed(2) : Math.round(n);
  return Number(v).toLocaleString('en-US', { minimumFractionDigits: dec ? 2 : 0, maximumFractionDigits: dec ? 2 : 0 });
}
function fmtK(n) {
  const a = Math.abs(n);
  if (a >= 1000) return (Math.round(n / 100) / 10).toLocaleString('en-US') + 'k';
  return String(Math.round(n));
}
function hexA(hex, a) {
  const h = hex.replace('#', '');
  const n = parseInt(h.length === 3 ? h.split('').map((c) => c + c).join('') : h, 16);
  return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
}

/* ── theme tokens (Lune design system) — matches Expenses ──────────── */
function makeTheme(dark, accent) {
  return dark ? {
    dark: true, accent,
    bg: '#070312', surface: '#14101F', surfaceAlt: '#1B1528', sunken: '#0B0716',
    ink: '#FFFFFF', muted: '#B8B2C4', faint: 'rgba(255,255,255,0.07)',
    line: 'rgba(255,255,255,0.12)',
    cardShadow: '0 1px 0 rgba(255,255,255,0.03)',
    radius: 24, radiusSm: 12,
    inInk: '#99F2AC', inBg: 'rgba(153,242,172,0.16)',
    outInk: '#FF9DAE', outBg: 'rgba(242,96,118,0.16)',
  } : {
    dark: false, accent,
    bg: '#F7F9F8', surface: '#FFFFFF', surfaceAlt: '#EEF2F1', sunken: '#EEF2F1',
    ink: '#002E2A', muted: '#44524E', faint: 'rgba(7,3,18,0.05)',
    line: '#E2E8E6',
    cardShadow: '0 1px 3px rgba(7,3,18,0.08), 0 1px 2px rgba(7,3,18,0.04)',
    radius: 24, radiusSm: 12,
    inInk: '#0A634D', inBg: 'rgba(10,99,77,0.10)',
    outInk: '#C2402F', outBg: 'rgba(194,64,47,0.09)',
  };
}

/* ── Lune category glyph (real DS SVG, recolored) ─────────────────── */
function CatGlyph({ glyph, size = 20, color = 'currentColor' }) {
  const data = (window.CAT_ICON_SVG || {})[glyph];
  if (!data) return <span style={{ display: 'inline-block', width: size, height: size }} />;

      dangerouslySetInnerHTML={{ __html: `<svg width="${size}" height="${size}" viewBox="${data.vb}" fill="none" preserveAspectRatio="xMidYMid meet" style="display:block">${data.inner}</svg>` }} />
  );
}
function CategoryMark({ glyph, color, size = 42, radius = 12, dark = false, solid = false }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: radius, flexShrink: 0,
      background: solid ? color : hexA(color, dark ? 0.22 : 0.13),
      display: 'flex', alignItems: 'center', justifyContent: 'center',

}

/* ── Lune moon mark ───────────────────────────────────────────────── */
function LuneMark({ size = 24, disc = '#002E2A', crescent = '#10A37F' }) {

    </svg>

}

/* ── merchant identity (logos w/ graceful fallback to Lune glyph) ──── */
const MERCHANT_DOMAIN = {
  'Emaar': 'emaar.com', 'Apple Store': 'apple.com', 'DEWA': 'dewa.gov.ae',
  'Carrefour': 'carrefour.com', 'Etisalat': 'etisalat.ae', 'Talabat': 'talabat.com',
  'Salik': 'salik.ae', 'Emirates NBD': 'emiratesnbd.com', 'Visa': 'visa.com', 'Noon': 'noon.com',
};
function logoURL(name) {
  const d = MERCHANT_DOMAIN[name];
  return d ? `https://icons.duckduckgo.com/ip3/${d}.ico` : null;
}
// Logo when we have a real brand domain & logos are on; else the tinted Lune glyph.
function MerchantMark({ name, glyph, color, size = 42, radius = 12, showLogos = true, dark = false }) {
  const [failed, setFailed] = useState(false);
  const url = showLogos ? logoURL(name) : null;
  if (!url || failed) {
    return <CategoryMark glyph={glyph} color={color} size={size} radius={radius} dark={dark} />;
  }
  return (
    <div style={{
      width: size, height: size, borderRadius: radius, background: '#FFFFFF', flexShrink: 0,
      display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden',
      boxShadow: dark ? 'inset 0 0 0 1px rgba(255,255,255,0.10)' : 'inset 0 0 0 1px rgba(0,0,0,0.06)',
    }}>
      <img src={url} alt="" onError={() => setFailed(true)}
        style={{ width: '74%', height: '74%', objectFit: 'contain', display: 'block' }} />

}

/* ── UI icons ─────────────────────────────────────────────────────── */
function UIIcon({ name, size = 20, stroke = 'currentColor', sw = 1.8 }) {
  const p = { fill: 'none', stroke, strokeWidth: sw, strokeLinecap: 'round', strokeLinejoin: 'round' };
  const g = {

  return <svg width={size} height={size} viewBox="0 0 24 24" style={{ display: 'block' }}>{g[name]}</svg>;
}

/* ── shared primitives (identical to Expenses) ────────────────────── */
function Screen({ T, children }) {
  return <div style={{ minHeight: '100%', background: T.bg, color: T.ink, paddingBottom: 44 }}>
    <div style={{ padding: '0 18px' }}>{children}</div>
  </div>;
}
function Card({ T, children, style = {}, onClick, pad = 18 }) {
  return <div onClick={onClick} style={{
    background: T.surface, borderRadius: T.radius, padding: pad, boxShadow: T.cardShadow,
    border: T.dark ? `1px solid ${T.line}` : 'none', cursor: onClick ? 'pointer' : 'default', ...style,
  }}>{children}</div>;
}
function SectionTitle({ T, children, hint }) {
  return <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', margin: '26px 2px 13px' }}>
    <h2 style={{ margin: 0, fontSize: 17, fontWeight: 640, letterSpacing: '-0.01em', color: T.ink }}>{children}</h2>
    {hint && <span style={{ fontSize: 12.5, fontWeight: 560, color: T.muted }}>{hint}</span>}
  </div>;
}
function Tag({ T, children, color }) {
  const c = color || T.accent;
  return <span style={{
    display: 'inline-flex', alignItems: 'center', gap: 4, fontSize: 11, fontWeight: 620,
    color: c, background: hexA(c, T.dark ? 0.2 : 0.12), padding: '3px 8px', borderRadius: 999,
  }}>{children}</span>;
}
function PeriodPill({ T, period, onClick }) {
  return <button onClick={onClick} className="cf-press" style={{
    display: 'inline-flex', alignItems: 'center', gap: 7, cursor: 'pointer', marginTop: 14,
    background: T.surface, border: `1px solid ${T.line}`, borderRadius: 999, padding: '8px 13px',
    color: T.ink, fontSize: 13.5, fontWeight: 580, boxShadow: T.dark ? 'none' : T.cardShadow, fontFamily: 'inherit',
  }}>
    <span style={{ color: T.accent, display: 'flex' }}><UIIcon name="calendar" size={16} stroke={T.accent} /></span>

    <UIIcon name="chevD" size={15} stroke={T.muted} />

}
function AppHeader({ T, title, eyebrow, onBack, period, onPeriod }) {
  return <div style={{ paddingTop: onBack ? 8 : 6 }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, minHeight: 40 }}>
      {onBack && <button onClick={onBack} aria-label="Back" className="cf-press" style={{
        width: 38, height: 38, borderRadius: 12, flexShrink: 0, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: T.surface, border: `1px solid ${T.line}`, color: T.ink, boxShadow: T.dark ? 'none' : T.cardShadow,
      }}><UIIcon name="chevL" size={20} /></button>}
      <div style={{ flex: 1, minWidth: 0 }}>
        {eyebrow && <div style={{ fontSize: 12.5, fontWeight: 600, color: T.muted }}>{eyebrow}</div>}
        <div style={{ fontSize: 25, fontWeight: 700, letterSpacing: '-0.025em', color: T.ink, lineHeight: 1.1 }}>{title}</div>

  </div>;
}

/* ── charts ───────────────────────────────────────────────────────── */
// Donut breakdown — matches the Expenses BreakdownHero
function Donut({ T, data, total, size = 208, thickness = 24, onSlice }) {
  const [hover, setHover] = useState(null);
  const [sel, setSel] = useState(null);
  const r = (size - thickness) / 2, cx = size / 2, cy = size / 2, C = 2 * Math.PI * r;
  let acc = 0; const gap = 0.012;
  const segs = data.map((d) => { const frac = d.total / total; const seg = { ...d, start: acc, frac }; acc += frac; return seg; });
  const activeId = sel != null ? sel : hover;
  const active = activeId != null ? segs.find((s) => s.id === activeId) : null;
  const tap = (id) => { if (sel === id) { onSlice && onSlice(id); } else { setSel(id); } };
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: 'rotate(-90deg)', animation: 'donutIn .7s cubic-bezier(.22,1,.36,1) both' }}>
        {segs.map((s) => {
          const len = Math.max(0.0001, (s.frac - gap)) * C;
          const dim = activeId != null && activeId !== s.id;
          const isHot = activeId === s.id;
          return <circle key={s.id} cx={cx} cy={cy} r={r} fill="none"
            stroke={s.color} strokeWidth={isHot ? thickness + 5 : thickness}
            strokeDasharray={`${len} ${C}`} strokeDashoffset={-s.start * C} strokeLinecap="round"
            opacity={dim ? 0.25 : 1} onClick={() => tap(s.id)}
            onMouseEnter={() => setHover(s.id)} onMouseLeave={() => setHover(null)}
            style={{ transition: 'opacity .2s, stroke-width .18s', cursor: onSlice ? 'pointer' : 'default' }} />;
        })}
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', pointerEvents: 'none', padding: 26, textAlign: 'center' }}>
        <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: active ? active.color : T.muted, transition: 'color .2s', whiteSpace: 'nowrap', maxWidth: '100%', overflow: 'hidden', textOverflow: 'ellipsis' }}>
          {active ? active.name : 'Total out'}
        </div>
        <div style={{ fontSize: size * 0.155, fontWeight: 680, color: T.ink, marginTop: 3, letterSpacing: '-0.02em', fontVariantNumeric: 'tabular-nums' }}>
          {fmtAED(active ? active.total : total)}
        </div>
        <div style={{ fontSize: 11.5, fontWeight: 600, color: active ? active.color : T.muted, marginTop: 2, transition: 'color .2s' }}>
          {active ? `${Math.round(active.total / total * 100)}%` : 'AED'}
        </div>
      </div>
    </div>
  );
}
function Legend({ color, label }) {
  return <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 12, fontWeight: 580 }}>
    <span style={{ width: 9, height: 9, borderRadius: 3, background: color }} />{label}
  </span>;
}
// Grouped inflow-vs-outflow timeline (landing)
function GroupedTrend({ T, months, inSeries, outSeries, height = 132 }) {
  const peak = Math.max(...inSeries, ...outSeries);
  const [hot, setHot] = useState(months.length - 1);
  const i = hot, net = inSeries[i] - outSeries[i];
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 14 }}>
        <div>
          <div style={{ fontSize: 12.5, color: T.muted, fontWeight: 560 }}>{months[i]} net</div>
          <div style={{ fontSize: 20, fontWeight: 720, color: net >= 0 ? T.inInk : T.outInk, fontVariantNumeric: 'tabular-nums' }}>
            {net >= 0 ? '+' : '−'}AED {fmtAED(Math.abs(net))}
          </div>
        </div>
        <div style={{ display: 'flex', gap: 14 }}>
          <Legend color={T.inInk} label={`In ${fmtAED(inSeries[i])}`} />
          <Legend color={T.outInk} label={`Out ${fmtAED(outSeries[i])}`} />
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 8, height }}>
        {months.map((m, idx) => {
          const ih = (inSeries[idx] / peak) * (height - 26);
          const oh = (outSeries[idx] / peak) * (height - 26);
          const lit = hot === idx;
          return (
            <div key={m} onMouseEnter={() => setHot(idx)} onClick={() => setHot(idx)}
              style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'flex-end', height: '100%', cursor: 'pointer', borderRadius: 9, padding: '4px 0', background: lit ? (T.dark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.03)') : 'transparent', transition: 'background .15s' }}>
              <div style={{ display: 'flex', gap: 3, alignItems: 'flex-end', justifyContent: 'center', flex: 1, width: '100%' }}>
                <div style={{ width: 9, height: ih, borderRadius: 4, background: T.inInk, opacity: lit ? 1 : 0.55, transition: 'opacity .15s', transformOrigin: 'bottom', animation: `growY .45s cubic-bezier(.22,1,.36,1) ${idx * 0.05}s both` }} />
                <div style={{ width: 9, height: oh, borderRadius: 4, background: T.outInk, opacity: lit ? 1 : 0.55, transition: 'opacity .15s', transformOrigin: 'bottom', animation: `growY .45s cubic-bezier(.22,1,.36,1) ${idx * 0.05 + 0.02}s both` }} />
              </div>
              <span style={{ fontSize: 10.5, color: lit ? T.ink : T.muted, marginTop: 8, fontWeight: lit ? 660 : 520 }}>{m}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}
// Single-series column trend
function ColumnTrend({ T, values, labels, color, height = 120 }) {
  const peak = Math.max(...values);

// Two-segment Inflow vs Outflow ring (the implemented Cashflow chart) — % labels + net center
function DuoDonut({ T, inflow, outflow, net, period, size = 196, thickness = 15 }) {
  const total = inflow + outflow || 1;
  const r = size / 2 - 28, cx = size / 2, cy = size / 2, C = 2 * Math.PI * r;
  const gap = 0.022, pos = net >= 0;
  const segs = [
    { id: 'in', value: inflow, color: T.inInk },
    { id: 'out', value: outflow, color: T.outInk },
  ];
  let acc = 0;
  const arcs = segs.map((s) => { const frac = s.value / total; const seg = { ...s, start: acc, frac }; acc += frac; return seg; });
  const labelPos = (mid) => { const a = mid * 2 * Math.PI - Math.PI / 2; const rr = r + thickness / 2 + 13; return { x: cx + rr * Math.cos(a), y: cy + rr * Math.sin(a) }; };
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: 'rotate(-90deg)', animation: 'donutIn .7s cubic-bezier(.22,1,.36,1) both' }}>
        {arcs.map((s) => {
          const len = Math.max(0.0001, (s.frac - gap)) * C;
          return <circle key={s.id} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={thickness}
            strokeDasharray={`${len} ${C}`} strokeDashoffset={-s.start * C} strokeLinecap="round" />;
        })}
      </svg>
      {arcs.map((s) => {
        const p = labelPos(s.start + s.frac / 2), pct = Math.round(s.value / total * 100);
        return <div key={s.id} style={{ position: 'absolute', left: p.x, top: p.y, transform: 'translate(-50%,-50%)', fontSize: 13, fontWeight: 720, color: s.color, fontVariantNumeric: 'tabular-nums' }}>{pct}%</div>;
      })}
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center', padding: 24 }}>
        <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: T.muted }}>Net</div>
        <div style={{ fontSize: 27, fontWeight: 720, color: pos ? T.inInk : T.outInk, marginTop: 2, letterSpacing: '-0.02em', fontVariantNumeric: 'tabular-nums' }}>{pos ? '+' : '−'}{fmtAED(Math.abs(net))}</div>
        <div style={{ fontSize: 11.5, fontWeight: 600, color: T.muted, marginTop: 2 }}>AED · {period}</div>
      </div>
    </div>
  );
}

        </div>
        <div style={{ marginTop: 6 }}>
          {data.map((d, i) => <MovementRow key={d.id} T={T} item={d} total={total} divider={i < data.length - 1} />)}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginTop: 8, padding: '10px 12px', borderRadius: 12, background: T.dark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.03)' }}>
          <span style={{ color: T.muted, display: 'flex' }}><UIIcon name="info" size={15} stroke={T.muted} /></span>
          <span style={{ fontSize: 12, color: T.muted, lineHeight: 1.45 }}>How much of your money went to growing savings, fixed commitments, and day-to-day life. For the category &amp; brand breakdown, see <b style={{ color: T.ink }}>Expenses</b>.</span>
        </div>
      </Card>
    </>
  );
}
function Outflow({ T, period, onPeriod, nav, showLogos }) {
  const out = DATA.outflowTotal;
  return (
    <Screen T={T}>
      <AppHeader T={T} title="Outflow" eyebrow="Cashflow" onBack={() => nav('back')} period={period} onPeriod={onPeriod} />
      <Card T={T} style={{ marginTop: 18 }}>
        <div style={{ fontSize: 13, color: T.muted, fontWeight: 580 }}>Total out · {DATA.dateLabel}</div>
        <div style={{ fontSize: 38, fontWeight: 760, letterSpacing: '-0.03em', marginTop: 4, color: T.outInk, fontVariantNumeric: 'tabular-nums' }}>
          −<span style={{ fontSize: 21, fontWeight: 620, marginRight: 2 }}>AED</span>{fmtAED(out)}
        </div>
        <div style={{ fontSize: 13, color: T.muted, marginTop: 10, lineHeight: 1.45 }}>Across {DATA.outflowCount} transactions this period.</div>
      </Card>

      <MovementSection T={T} data={DATA.outflowMovement} total={out} />

      <SectionTitle T={T} hint="Last 6 months">Outflow over time</SectionTitle>
      <Card T={T}><ColumnTrend T={T} values={DATA.outflowSeries} labels={DATA.months} color={T.outInk} /></Card>

      <SectionTitle T={T} hint="Enriched by Lune">Top merchants</SectionTitle>
      <Card T={T} pad="6px 16px">
        {DATA.outflowMerchants.map((m, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 13, padding: '12px 0', position: 'relative' }}>
            <MerchantMark name={m.merchant} glyph={m.glyph} color={m.color} showLogos={showLogos} dark={T.dark} size={42} radius={12} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 15, fontWeight: 560, color: T.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{m.name}</div>
              <div style={{ marginTop: 6 }}><Tag T={T} color={m.color}>{m.cat}</Tag></div>
            </div>
            <div style={{ fontSize: 15, fontWeight: 620, color: T.ink, fontVariantNumeric: 'tabular-nums' }}>−AED {fmtAED(m.amount)}</div>
            {i < DATA.outflowMerchants.length - 1 && <div style={{ position: 'absolute', left: 55, right: 0, bottom: 0, height: 1, background: T.faint }} />}
          </div>
        ))}
      </Card>

      <SectionTitle T={T} hint={`${DATA.outflowTxns.length} this period`}>Transactions</SectionTitle>
      <Card T={T} pad="6px 16px">
        {DATA.outflowTxns.map((t, i) => <FlowRow key={i} T={T} item={t} sign="−" showLogos={showLogos} divider={i < DATA.outflowTxns.length - 1} />)}
      </Card>
    </Screen>
  );
}

/* ── SCREEN 3 — Inflow ────────────────────────────────────────────── */
function Stat({ T, label, value }) {
  return <div style={{ flex: 1 }}>
    <div style={{ fontSize: 12, color: T.muted, fontWeight: 560 }}>{label}</div>
    <div style={{ fontSize: 16, fontWeight: 700, marginTop: 4, color: T.ink, fontVariantNumeric: 'tabular-nums' }}>
      <span style={{ fontSize: 11, fontWeight: 600, color: T.muted, marginRight: 2 }}>AED</span>{fmtAED(value)}
    </div>
  </div>;
}
function Inflow({ T, period, onPeriod, nav, showLogos }) {
  const inn = DATA.inflowTotal, series = DATA.inflowSeries;
  const hi = Math.max(...series), lo = Math.min(...series), avg = series.reduce((a, b) => a + b, 0) / series.length;
  const variation = Math.round(((hi - lo) / 2 / avg) * 100);
  const salaryRecur = DATA.inflowSources.filter((s) => s.recur).length;
  return (
    <Screen T={T}>
      <AppHeader T={T} title="Inflow" eyebrow="Cashflow" onBack={() => nav('back')} period={period} onPeriod={onPeriod} />
      <Card T={T} style={{ marginTop: 18 }}>
        <div style={{ fontSize: 13, color: T.muted, fontWeight: 580 }}>Total in · {DATA.dateLabel}</div>
        <div style={{ fontSize: 38, fontWeight: 760, letterSpacing: '-0.03em', marginTop: 4, color: T.inInk, fontVariantNumeric: 'tabular-nums' }}>
          +<span style={{ fontSize: 21, fontWeight: 620, marginRight: 2 }}>AED</span>{fmtAED(inn)}
        </div>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, marginTop: 12, fontSize: 13, fontWeight: 600, color: T.inInk, background: T.inBg, padding: '5px 11px', borderRadius: 999 }}>
          <UIIcon name="repeat" size={14} stroke={T.inInk} />
          Steady income · varied ±{variation}% over 6 months
        </div>
      </Card>

      <SectionTitle T={T} hint="By type">Income breakdown</SectionTitle>
      <Card T={T} pad="2px 18px">
        {DATA.inflowTypes.map((c, i, a) => <SummaryRow key={c.id} T={T} item={c} total={inn} divider={i < a.length - 1} />)}
      </Card>

      <SectionTitle T={T} hint="Last 6 months">Income stability</SectionTitle>
      <Card T={T}>
        <div style={{ display: 'flex', gap: 18, marginBottom: 16 }}>
          <Stat T={T} label="Lowest" value={lo} />
          <Stat T={T} label="Average" value={Math.round(avg)} />
          <Stat T={T} label="Highest" value={hi} />
        </div>
        <ColumnTrend T={T} values={series} labels={DATA.months} color={T.inInk} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginTop: 16, padding: '10px 12px', borderRadius: 12, background: T.dark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.03)' }}>
          <span style={{ color: T.inInk, display: 'flex' }}><UIIcon name="repeat" size={15} stroke={T.inInk} /></span>
          <span style={{ fontSize: 12, color: T.muted, lineHeight: 1.45 }}><b style={{ color: T.ink }}>{salaryRecur} of {DATA.inflowSources.length}</b> sources recur regularly — your salary lands every month.</span>
        </div>
      </Card>

      <SectionTitle T={T} hint="Enriched by Lune">Top sources</SectionTitle>
      <Card T={T} pad="6px 16px">
        {DATA.inflowSources.map((s, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 13, padding: '12px 0', position: 'relative' }}>
            <MerchantMark name={s.merchant} glyph={s.glyph} color={s.color} showLogos={showLogos} dark={T.dark} size={42} radius={12} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 15, fontWeight: 560, color: T.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{s.name}</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 4 }}>
                <span style={{ fontSize: 12.5, color: T.muted }}>{s.sub}</span>
                {s.recur && <Tag T={T} color={T.inInk}><UIIcon name="repeat" size={11} stroke={T.inInk} />{s.recur}</Tag>}
              </div>
            </div>
            <div style={{ fontSize: 15, fontWeight: 620, color: T.inInk, fontVariantNumeric: 'tabular-nums' }}>+AED {fmtAED(s.total)}</div>
            {i < DATA.inflowSources.length - 1 && <div style={{ position: 'absolute', left: 55, right: 0, bottom: 0, height: 1, background: T.faint }} />}
          </div>
        ))}
      </Card>

      <SectionTitle T={T} hint={`${DATA.inflowTxns.length} this period`}>Transactions</SectionTitle>
      <Card T={T} pad="6px 16px">
        {DATA.inflowTxns.map((t, i) => <FlowRow key={i} T={T} item={t} sign="+" showLogos={showLogos} divider={i < DATA.inflowTxns.length - 1} />)}
      </Card>
    </Screen>
  );
}

/* ── iOS device frame ─────────────────────────────────────────────── */
function IOSStatusBar({ dark }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{ height: 56, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 30px 0 36px', position: 'absolute', top: 0, left: 0, right: 0, zIndex: 30 }}>
      <span style={{ fontSize: 16, fontWeight: 680, color: c, letterSpacing: '-0.02em' }}>9:41</span>
      <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
        <svg width="18" height="12" viewBox="0 0 18 12"><g fill={c}><rect x="0" y="7" width="3" height="5" rx="1" /><rect x="5" y="4.5" width="3" height="7.5" rx="1" /><rect x="10" y="2" width="3" height="10" rx="1" /><rect x="15" y="0" width="3" height="12" rx="1" /></g></svg>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 3.2c2 0 3.8.8 5.2 2.1M8.5 3.2C6.5 3.2 4.7 4 3.3 5.3M8.5 7c1 0 1.9.4 2.6 1M8.5 7c-1 0-1.9.4-2.6 1" stroke={c} strokeWidth="1.5" strokeLinecap="round" /><circle cx="8.5" cy="10.3" r="1" fill={c} /></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="1" width="21" height="10" rx="3" fill="none" stroke={c} strokeOpacity="0.4" /><rect x="2" y="2.5" width="17" height="7" rx="1.5" fill={c} /><rect x="23" y="4" width="2" height="4" rx="1" fill={c} fillOpacity="0.5" /></svg>
      </div>
    </div>
  );
}

/* ── app ──────────────────────────────────────────────────────────── */
function CashflowApp(props) {
  const accent = props.accent || '#10A37F';
  const dark = props.dark || false;
  const showLogos = props.showLogos !== false;
  const T = makeTheme(dark, accent);

  const [stack, setStack] = useState([{ screen: 'landing' }]);
  const [anim, setAnim] = useState('fwd');
  const [period, setPeriod] = useState(DATA.period);
  const [periodOpen, setPeriodOpen] = useState(false);
  const [timelineOpen, setTimelineOpen] = useState(false);
  const scroller = useRef(null);

  const nav = (to) => {
    if (to === 'back') { setAnim('back'); setStack((s) => s.length > 1 ? s.slice(0, -1) : s); }
    else { setAnim('fwd'); setStack((s) => [...s, { screen: to }]); }
  };
  const top = stack[stack.length - 1];
  useEffect(() => { if (scroller.current) scroller.current.scrollTop = 0; }, [stack.length]);

  const render = () => {
    const common = { T, period, onPeriod: () => setPeriodOpen(true), nav, showLogos, onTimeline: () => setTimelineOpen(true) };
    if (top.screen === 'outflow') return <Outflow {...common} />;
    if (top.screen === 'inflow') return <Inflow {...common} />;
    return <Landing {...common} />;
  };

  return (
    <div style={{ width: '100%', height: '100%', minHeight: 892, display: 'flex', alignItems: 'center', justifyContent: 'center', background: dark ? '#030109' : '#E2E8E6', padding: 24, boxSizing: 'border-box', transition: 'background .3s', fontFamily: "'Plus Jakarta Sans', -apple-system, system-ui, sans-serif" }}>
      <div style={{ width: 390, height: 844, borderRadius: 48, overflow: 'hidden', position: 'relative', background: T.bg, boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)' }}>
        <div style={{ position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)', width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50 }} />
        <IOSStatusBar dark={dark} />
        <div ref={scroller} className="cf-screens" style={{ height: '100%', overflowY: 'auto', overflowX: 'hidden', paddingTop: 56 }}>
          <div key={stack.length + '-' + top.screen} className={anim === 'fwd' ? 'slide-fwd' : 'slide-back'}>{render()}</div>
        </div>
        <PeriodSheet T={T} open={periodOpen} onClose={() => setPeriodOpen(false)} period={period} onPick={setPeriod} />
        <TimelineSheet T={T} open={timelineOpen} onClose={() => setTimelineOpen(false)} />
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60, height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end', paddingBottom: 8, pointerEvents: 'none' }}>
          <div style={{ width: 139, height: 5, borderRadius: 100, background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)' }} />
        </div>
      </div>
    </div>
  );
}

window.CashflowApp = CashflowApp;

/* Mount — props mirror the Cashflow.dc defaults (accent #10A37F, light, logos on) */
ReactDOM.createRoot(document.getElementById('root'))
  .render(<CashflowApp accent="#10A37F" dark={false} showLogos={true} />);
</script>
</body>
</html>
