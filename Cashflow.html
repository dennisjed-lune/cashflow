<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, useMemo } = React;

/* ──────────────────────────────────────────────────────────────
   Cashflow module — Lune SDK prototype.
   Liquidity lens: Landing (in vs out vs net) → Outflow + Inflow.
   Mock data: UAE consumer, AED. Inflow is by TYPE (no brands);
   Outflow is money-movement (high-level summary, no deep drill).
   ────────────────────────────────────────────────────────────── */

const DATA = {

    { name: 'Interest — Emirates NBD',    sub: 'Other income', total: 600,   recur: 'Monthly',   glyph: 'interest',   color: '#8C7BE6' },

    { name: 'Interest — Emirates NBD',sub: '1 May 2026',  amount: 600,   recur: true,  glyph: 'interest',   color: '#8C7BE6' },
    { name: 'Cashback — Visa Rewards',sub: '22 May 2026', amount: 250,   recur: false, glyph: 'gift',       color: '#8C7BE6' },
    { name: 'Refund — Noon',          sub: '18 May 2026', amount: 150,   recur: false, glyph: 'gift',       color: '#8C7BE6' },
  ],

  outflowCats: [

    { id: 'bills',     name: 'Bills & utilities',total: 2180, color: '#2F8F7E', glyph: 'bolt' },

  outflowMerchants: [

/* ── helpers ───────────────────────────────────────────────── */
function fmtAED(n, dec = false) {
  const v = dec ? Number(n).toFixed(2) : Math.round(n);
  return Number(v).toLocaleString('en-US', { minimumFractionDigits: dec ? 2 : 0, maximumFractionDigits: dec ? 2 : 0 });
}
// Compact form so every bar can show its value without crowding (24,800 → 24.8k)
function fmtK(n) {
  const a = Math.abs(n);
  if (a >= 1000) return (Math.round(n / 100) / 10).toLocaleString('en-US') + 'k';
  return String(Math.round(n));
}
function hexA(hex, a) {
  const h = hex.replace('#', '');
  const n = parseInt(h.length === 3 ? h.split('').map(c => c + c).join('') : h, 16);
  return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
}

/* ── theme tokens (Lune design system) ─────────────────────── */
function makeTheme(dark, accent) {
  return dark ? {
    dark: true, accent,
    bg: '#070312', surface: '#14101F', surfaceAlt: '#1B1528', sunken: '#0B0716',
    ink: '#FFFFFF', muted: '#B8B2C4', faint: 'rgba(255,255,255,0.07)',
    line: 'rgba(255,255,255,0.12)',
    cardShadow: '0 1px 0 rgba(255,255,255,0.03)',
    radius: 24, radiusSm: 12,
    inInk: '#99F2AC', inBg: 'rgba(153,242,172,0.16)',
    outInk: '#FF9DAE', outBg: 'rgba(242,96,118,0.16)',
  } : {
    dark: false, accent,
    bg: '#F7F9F8', surface: '#FFFFFF', surfaceAlt: '#EEF2F1', sunken: '#EEF2F1',
    ink: '#002E2A', muted: '#44524E', faint: 'rgba(7,3,18,0.05)',
    line: '#E2E8E6',
    cardShadow: '0 1px 3px rgba(7,3,18,0.08), 0 1px 2px rgba(7,3,18,0.04)',
    radius: 24, radiusSm: 12,
    inInk: '#0A634D', inBg: 'rgba(10,99,77,0.10)',
    outInk: '#C2402F', outBg: 'rgba(194,64,47,0.09)',
  };
}

/* ── icons ─────────────────────────────────────────────────── */
function UIIcon({ name, size = 20, stroke = 'currentColor', sw = 1.8 }) {
  const p = { fill: 'none', stroke, strokeWidth: sw, strokeLinecap: 'round', strokeLinejoin: 'round' };
  const g = {
    chevR: <path d="M9 6l6 6-6 6" {...p} />,
    chevL: <path d="M15 6l-6 6 6 6" {...p} />,
    chevD: <path d="M6 9l6 6 6-6" {...p} />,
    calendar: <g {...p}><rect x="3.5" y="5" width="17" height="16" rx="3" /><path d="M3.5 9.5h17M8 3v4M16 3v4" /></g>,
    close: <path d="M6 6l12 12M18 6L6 18" {...p} />,
    arrowDn: <g {...p}><path d="M12 5v14M12 19l-6-6M12 19l6-6" /></g>,
    arrowUp: <g {...p}><path d="M12 19V5M12 5l-6 6M12 5l6 6" /></g>,
    repeat: <g {...p}><path d="M17 2l3 3-3 3" /><path d="M4 11V9a4 4 0 0 1 4-4h12" /><path d="M7 22l-3-3 3-3" /><path d="M20 13v2a4 4 0 0 1-4 4H4" /></g>,
    check: <path d="M5 12.5l4.5 4.5L19 7" {...p} sw={2.2} />,
    info: <g {...p}><circle cx="12" cy="12" r="9" /><path d="M12 11v5M12 8h.01" /></g>,
    scale: <g {...p}><path d="M12 4v16M5 8h14M7 8l-3 6a3 3 0 0 0 6 0L7 8zM17 8l-3 6a3 3 0 0 0 6 0l-3-6z" /></g>,
  };
  return <svg width={size} height={size} viewBox="0 0 24 24" style={{ display: 'block' }}>{g[name]}</svg>;
}

function Glyph({ name, size = 22, color = '#000' }) {
  const p = { fill: 'none', stroke: color, strokeWidth: 1.8, strokeLinecap: 'round', strokeLinejoin: 'round' };
  const g = {
    salary:     <g {...p}><rect x="3" y="6" width="18" height="13" rx="3" /><path d="M3 10h18" /><circle cx="16.5" cy="14.5" r="1.6" /></g>,
    transfer:   <g {...p}><path d="M7 8h12M19 8l-3-3M19 8l-3 3" /><path d="M17 16H5M5 16l3-3M5 16l3 3" /></g>,
    government: <g {...p}><path d="M4 10h16M5 10v8M9 10v8M15 10v8M19 10v8M3 20h18M12 3l8 5H4l8-5z" /></g>,
    interest:   <g {...p}><circle cx="8" cy="8" r="3" /><circle cx="16" cy="16" r="3" /><path d="M6 18L18 6" /></g>,
    gift:       <g {...p}><rect x="4" y="9" width="16" height="11" rx="2" /><path d="M4 13h16M12 9v11M12 9c-1.5-3-5-3-5-1s3.5 1 5 1zM12 9c1.5-3 5-3 5-1s-3.5 1-5 1z" /></g>,
    home:       <g {...p}><path d="M4 11l8-6 8 6M6 10v9h12v-9" /><path d="M10 19v-5h4v5" /></g>,
    bolt:       <g {...p}><path d="M13 3L5 13h6l-1 8 8-10h-6l1-8z" /></g>,
    bag:        <g {...p}><path d="M6 8h12l-1 12H7L6 8z" /><path d="M9 8a3 3 0 0 1 6 0" /></g>,
    cart:       <g {...p}><circle cx="9" cy="20" r="1.4" /><circle cx="17" cy="20" r="1.4" /><path d="M3 4h2l2.5 12h11l2-8H6" /></g>,
    fork:       <g {...p}><path d="M7 3v7a2 2 0 0 0 4 0V3M9 10v11M17 3c-1.5 0-2.5 1.5-2.5 4s1 4 2.5 4M17 3v18" /></g>,
    car:        <g {...p}><path d="M4 14l1.5-5h13L20 14M3 14h18v4H3zM6 18v1.5M18 18v1.5" /><circle cx="7" cy="14.5" r="1" /><circle cx="17" cy="14.5" r="1" /></g>,
    dots:       <g fill={color} stroke="none"><circle cx="6" cy="12" r="1.7" /><circle cx="12" cy="12" r="1.7" /><circle cx="18" cy="12" r="1.7" /></g>,
  };
  return <svg width={size} height={size} viewBox="0 0 24 24" style={{ display: 'block' }}>{g[name]}</svg>;
}

function Mark({ glyph, color, size = 42, radius = 12, dark = false, solid = false }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: radius, flexShrink: 0,
      background: solid ? color : hexA(color, dark ? 0.22 : 0.13),
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      <Glyph name={glyph} size={size * 0.5} color={solid ? '#fff' : color} />
    </div>
  );
}

/* ── shared primitives ─────────────────────────────────────── */
function Screen({ T, children }) {
  return <div style={{ minHeight: '100%', background: T.bg, color: T.ink, paddingBottom: 44 }}>
    <div style={{ padding: '0 18px' }}>{children}</div>
  </div>;
}
function Card({ T, children, style = {}, onClick, pad = 18, className }) {
  return <div onClick={onClick} className={className} style={{
    background: T.surface, borderRadius: T.radius, padding: pad, boxShadow: T.cardShadow,
    border: T.dark ? `1px solid ${T.line}` : 'none', cursor: onClick ? 'pointer' : 'default', ...style,
  }}>{children}</div>;
}
function SectionTitle({ T, children, hint }) {
  return <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', margin: '26px 2px 13px' }}>
    <h2 style={{ margin: 0, fontSize: 17, fontWeight: 640, letterSpacing: '-0.01em', color: T.ink }}>{children}</h2>
    {hint && <span style={{ fontSize: 12.5, fontWeight: 560, color: T.muted }}>{hint}</span>}
  </div>;
}
function Tag({ T, children, color }) {
  const c = color || T.accent;
  return <span style={{
    display: 'inline-flex', alignItems: 'center', gap: 4, fontSize: 11, fontWeight: 620,
    color: c, background: hexA(c, T.dark ? 0.2 : 0.12), padding: '3px 8px', borderRadius: 999,
  }}>{children}</span>;
}
function PeriodPill({ T, period, onClick }) {
  return <button onClick={onClick} className="cf-press" style={{
    display: 'inline-flex', alignItems: 'center', gap: 7, cursor: 'pointer', marginTop: 14,
    background: T.surface, border: `1px solid ${T.line}`, borderRadius: 999, padding: '8px 13px',
    color: T.ink, fontSize: 13.5, fontWeight: 580, boxShadow: T.dark ? 'none' : T.cardShadow,
  }}>
    <span style={{ color: T.accent, display: 'flex' }}><UIIcon name="calendar" size={16} stroke={T.accent} /></span>
    {period}
    <UIIcon name="chevD" size={15} stroke={T.muted} />
  </button>;
}
function AppHeader({ T, title, eyebrow, onBack, period, onPeriod }) {
  return <div style={{ paddingTop: onBack ? 8 : 6 }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, minHeight: 40 }}>
      {onBack && <button onClick={onBack} aria-label="Back" className="cf-press" style={{
        width: 38, height: 38, borderRadius: 12, flexShrink: 0, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: T.surface, border: `1px solid ${T.line}`, color: T.ink, boxShadow: T.dark ? 'none' : T.cardShadow,
      }}><UIIcon name="chevL" size={20} /></button>}
      <div style={{ flex: 1, minWidth: 0 }}>
        {eyebrow && <div style={{ fontSize: 12.5, fontWeight: 600, color: T.muted }}>{eyebrow}</div>}
        <div style={{ fontSize: 25, fontWeight: 700, letterSpacing: '-0.025em', color: T.ink, lineHeight: 1.1 }}>{title}</div>
      </div>
    </div>
    {onPeriod && <PeriodPill T={T} period={period} onClick={onPeriod} />}
  </div>;
}

/* ── charts ─────────────────────────────────────────────────── */
// Grouped inflow-vs-outflow timeline (landing)
function GroupedTrend({ T, months, inSeries, outSeries, height = 132 }) {
  const peak = Math.max(...inSeries, ...outSeries);
  const [hot, setHot] = useState(months.length - 1);
  const i = hot;
  const net = inSeries[i] - outSeries[i];
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 14 }}>
        <div>
          <div style={{ fontSize: 12.5, color: T.muted, fontWeight: 560 }}>{months[i]} net</div>
          <div style={{ fontSize: 20, fontWeight: 720, color: net >= 0 ? T.inInk : T.outInk, fontVariantNumeric: 'tabular-nums' }}>
            {net >= 0 ? '+' : '−'}AED {fmtAED(Math.abs(net))}
          </div>
        </div>
        <div style={{ display: 'flex', gap: 14 }}>
          <Legend color={T.inInk} label={`In ${fmtAED(inSeries[i])}`} />
          <Legend color={T.outInk} label={`Out ${fmtAED(outSeries[i])}`} />
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 8, height }}>
        {months.map((m, idx) => {
          const ih = (inSeries[idx] / peak) * (height - 26);
          const oh = (outSeries[idx] / peak) * (height - 26);
          const lit = hot === idx;
          return (
            <div key={m} onMouseEnter={() => setHot(idx)} onClick={() => setHot(idx)}
              style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'flex-end', height: '100%', cursor: 'pointer', borderRadius: 9, padding: '4px 0', background: lit ? (T.dark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.03)') : 'transparent', transition: 'background .15s' }}>
              <div style={{ display: 'flex', gap: 3, alignItems: 'flex-end', justifyContent: 'center', flex: 1, width: '100%' }}>
                <div style={{ width: 9, height: ih, borderRadius: 4, background: T.inInk, opacity: lit ? 1 : 0.55, transition: 'opacity .15s', transformOrigin: 'bottom', animation: `growY .45s cubic-bezier(.22,1,.36,1) ${idx * 0.05}s both` }} />
                <div style={{ width: 9, height: oh, borderRadius: 4, background: T.outInk, opacity: lit ? 1 : 0.55, transition: 'opacity .15s', transformOrigin: 'bottom', animation: `growY .45s cubic-bezier(.22,1,.36,1) ${idx * 0.05 + 0.02}s both` }} />
              </div>
              <span style={{ fontSize: 10.5, color: lit ? T.ink : T.muted, marginTop: 8, fontWeight: lit ? 660 : 520 }}>{m}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}
function Legend({ color, label }) {
  return <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 12, fontWeight: 580 }}>
    <span style={{ width: 9, height: 9, borderRadius: 3, background: color }} />{label}
  </span>;
}

// Single-series column trend (outflow / inflow over time)
function ColumnTrend({ T, values, labels, color, height = 120 }) {
  const peak = Math.max(...values);
  const [hot, setHot] = useState(values.length - 1);
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6, height }}>
      {values.map((v, i) => {
        const h = (v / peak) * (height - 34);
        const lit = hot === i;
        return (
          <div key={i} onMouseEnter={() => setHot(i)} onClick={() => setHot(i)}
            style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'flex-end', height: '100%', cursor: 'pointer', borderRadius: 9, padding: '4px 0', background: lit ? (T.dark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.03)') : 'transparent', transition: 'background .15s' }}>
            <span style={{ fontSize: 10, fontWeight: lit ? 720 : 600, color: lit ? T.ink : T.muted, marginBottom: 5, transition: 'color .15s', fontVariantNumeric: 'tabular-nums', whiteSpace: 'nowrap' }}>{fmtK(v)}</span>
            <div style={{ width: '100%', maxWidth: 32, height: h, borderRadius: 7, background: lit ? color : (T.dark ? 'rgba(255,255,255,0.13)' : 'rgba(0,0,0,0.08)'), transition: 'background .15s', transformOrigin: 'bottom', animation: `growY .45s cubic-bezier(.22,1,.36,1) ${i * 0.06}s both` }} />
            <span style={{ fontSize: 10.5, color: lit ? T.ink : T.muted, marginTop: 8, fontWeight: lit ? 600 : 520 }}>{labels[i]}</span>
          </div>
        );
      })}
    </div>
  );
}

// Stacked single bar + legend (breakdown by type / by category)
function StackedBar({ T, data, total, onSeg }) {
  const [hot, setHot] = useState(null);
  return (
    <div>
      <div style={{ display: 'flex', height: 46, borderRadius: 14, overflow: 'hidden', gap: 3 }}>
        {data.map((d, i) => {
          const pct = (d.total / total) * 100;
          const dim = hot != null && hot !== d.id;
          return <div key={d.id} onMouseEnter={() => setHot(d.id)} onMouseLeave={() => setHot(null)} onClick={() => onSeg && onSeg(d.id)}
            style={{ width: `${pct}%`, background: d.color, height: '100%', borderRadius: 7, minWidth: 4, cursor: onSeg ? 'pointer' : 'default', opacity: dim ? 0.4 : 1, transition: 'opacity .18s', transformOrigin: 'left center', animation: `growX .45s cubic-bezier(.22,1,.36,1) ${i * 0.04}s both` }} />;
        })}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '4px 14px', marginTop: 16 }}>
        {data.map((d) => {
          const share = Math.round((d.total / total) * 100);
          const dim = hot != null && hot !== d.id;
          return <div key={d.id} onMouseEnter={() => setHot(d.id)} onMouseLeave={() => setHot(null)} onClick={() => onSeg && onSeg(d.id)}
            style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '6px 8px', margin: '0 -8px', borderRadius: 9, cursor: onSeg ? 'pointer' : 'default', background: hot === d.id ? (T.dark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.035)') : 'transparent', opacity: dim ? 0.5 : 1, transition: 'opacity .18s, background .18s' }}>
            <span style={{ width: 9, height: 9, borderRadius: 3, background: d.color, flexShrink: 0 }} />
            <span style={{ fontSize: 13, color: T.ink, fontWeight: 520, flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{d.name}</span>
            <span style={{ fontSize: 12.5, color: T.muted, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{share}%</span>
          </div>;
        })}
      </div>
    </div>
  );
}

/* ── rows ───────────────────────────────────────────────────── */
function FlowRow({ T, item, sign, divider }) {

  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 13, padding: '11px 0', position: 'relative' }}>

        <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>

        <div style={{ fontSize: 12.5, color: T.muted, marginTop: 2 }}>{item.sub}</div>

      <div style={{ fontSize: 15, fontWeight: 620, color: c, fontVariantNumeric: 'tabular-nums' }}>{sign}AED {fmtAED(item.amount)}</div>

}
function SummaryRow({ T, item, total, divider }) {

/* ── bottom sheet (period picker) ──────────────────────────── */

function PeriodSheet({ T, open, onClose, period, onPick }) {

/* ── SCREEN 1 — Landing ─────────────────────────────────────── */

  const net = DATA.inflowTotal - DATA.outflowTotal;
  const pos = net >= 0;
  return (
    <Screen T={T}>
      <AppHeader T={T} eyebrow={`Good evening, ${DATA.customer}`} title="Cashflow" period={period} onPeriod={onPeriod} />

      {/* Net hero */}

        <div style={{ fontSize: 13, color: T.muted, fontWeight: 580 }}>Net this period</div>

          {pos ? '+' : '−'}<span style={{ fontSize: 22, fontWeight: 620, marginRight: 2 }}>AED</span>{fmtAED(Math.abs(net))}
        </div>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, marginTop: 10, fontSize: 13, fontWeight: 600, color: pos ? T.inInk : T.outInk, background: pos ? T.inBg : T.outBg, padding: '5px 11px', borderRadius: 999 }}>
          <UIIcon name={pos ? 'arrowUp' : 'arrowDn'} size={14} stroke={pos ? T.inInk : T.outInk} />

          <div style={{ width: 1, background: T.faint }} />

      <SectionTitle T={T} hint="Last 6 months">Cashflow over time</SectionTitle>
      <Card T={T}><GroupedTrend T={T} months={DATA.months} inSeries={DATA.inflowSeries} outSeries={DATA.outflowSeries} /></Card>

      {/* Entry points */}
      <SectionTitle T={T}>Explore</SectionTitle>
      <EntryCard T={T} dir="in" title="Inflow" sub="Where your money comes from" total={DATA.inflowTotal} onClick={() => nav('inflow')} />

}
function MiniStat({ T, label, value, color, dir }) {

}
function EntryCard({ T, dir, title, sub, total, onClick }) {

      </div>

}

/* ── SCREEN 2 — Outflow (money-movement lens) ──────────────── */

          −<span style={{ fontSize: 21, fontWeight: 620, marginRight: 2 }}>AED</span>{fmtAED(out)}

          <span style={{ color: T.muted, display: 'flex' }}><UIIcon name="info" size={15} stroke={T.muted} /></span>

        {DATA.outflowMerchants.map((m, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 13, padding: '12px 0', position: 'relative' }}>
            <Mark glyph={m.glyph} color={m.color} dark={T.dark} size={42} radius={12} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 15, fontWeight: 560, color: T.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{m.name}</div>
              <div style={{ marginTop: 6 }}><Tag T={T} color={m.color}>{m.cat}</Tag></div>
            </div>
            <div style={{ fontSize: 15, fontWeight: 620, color: T.ink, fontVariantNumeric: 'tabular-nums' }}>−AED {fmtAED(m.amount)}</div>

}
function CompareBar({ T, label, value, peak, color }) {

    </div>
    <span style={{ width: 78, textAlign: 'right', fontSize: 12.5, fontWeight: 640, color: T.ink, fontVariantNumeric: 'tabular-nums' }}>AED {fmtAED(value)}</span>

}

/* ── SCREEN 3 — Inflow (income source / stability lens) ────── */
function Inflow({ T, period, onPeriod, nav }) {
  const inn = DATA.inflowTotal;
  const series = DATA.inflowSeries;
  const hi = Math.max(...series), lo = Math.min(...series), avg = series.reduce((a, b) => a + b, 0) / series.length;
  const variation = Math.round(((hi - lo) / 2 / avg) * 100); // ± band
  const salaryRecur = DATA.inflowSources.filter(s => s.recur).length;
  return (
    <Screen T={T}>
      <AppHeader T={T} title="Inflow" eyebrow="Cashflow" onBack={() => nav('back')} period={period} onPeriod={onPeriod} />

      {/* Total in */}
      <Card T={T} style={{ marginTop: 18 }}>
        <div style={{ fontSize: 13, color: T.muted, fontWeight: 580 }}>Total in · {DATA.dateLabel}</div>
        <div style={{ fontSize: 38, fontWeight: 760, letterSpacing: '-0.03em', marginTop: 4, color: T.inInk, fontVariantNumeric: 'tabular-nums' }}>
          +<span style={{ fontSize: 21, fontWeight: 620, marginRight: 2 }}>AED</span>{fmtAED(inn)}
        </div>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, marginTop: 12, fontSize: 13, fontWeight: 600, color: T.inInk, background: T.inBg, padding: '5px 11px', borderRadius: 999 }}>
          <UIIcon name="repeat" size={14} stroke={T.inInk} />
          Steady income · varied ±{variation}% over 6 months
        </div>
      </Card>

      {/* Breakdown by TYPE (no brands) */}
      <SectionTitle T={T} hint="By type">Income breakdown</SectionTitle>
      <Card T={T}><StackedBar T={T} data={DATA.inflowTypes} total={inn} /></Card>

      {/* Income stability over time */}
      <SectionTitle T={T} hint="Last 6 months">Income stability</SectionTitle>
      <Card T={T}>
        <div style={{ display: 'flex', gap: 18, marginBottom: 16 }}>
          <Stat T={T} label="Lowest" value={lo} />
          <Stat T={T} label="Average" value={Math.round(avg)} />
          <Stat T={T} label="Highest" value={hi} />
        </div>
        <ColumnTrend T={T} values={series} labels={DATA.months} color={T.inInk} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginTop: 16, padding: '10px 12px', borderRadius: 12, background: T.dark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.03)' }}>
          <span style={{ color: T.inInk, display: 'flex' }}><UIIcon name="repeat" size={15} stroke={T.inInk} /></span>
          <span style={{ fontSize: 12, color: T.muted, lineHeight: 1.45 }}><b style={{ color: T.ink }}>{salaryRecur} of {DATA.inflowSources.length}</b> sources recur regularly — your salary lands every month.</span>
        </div>
      </Card>

      {/* Top sources (sources, never brands) */}
      <SectionTitle T={T} hint="Enriched by Lune">Top sources</SectionTitle>
      <Card T={T} pad="6px 16px">
        {DATA.inflowSources.map((s, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 13, padding: '12px 0', position: 'relative' }}>
            <Mark glyph={s.glyph} color={s.color} dark={T.dark} size={42} radius={12} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 15, fontWeight: 560, color: T.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{s.name}</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 4 }}>
                <span style={{ fontSize: 12.5, color: T.muted }}>{s.sub}</span>
                {s.recur && <Tag T={T} color={T.inInk}><UIIcon name="repeat" size={11} stroke={T.inInk} />{s.recur}</Tag>}
              </div>
            </div>
            <div style={{ fontSize: 15, fontWeight: 620, color: T.inInk, fontVariantNumeric: 'tabular-nums' }}>+AED {fmtAED(s.total)}</div>
            {i < DATA.inflowSources.length - 1 && <div style={{ position: 'absolute', left: 55, right: 0, bottom: 0, height: 1, background: T.faint }} />}
          </div>
        ))}
      </Card>

      {/* Transactions */}
      <SectionTitle T={T} hint={`${DATA.inflowTxns.length} this period`}>Transactions</SectionTitle>
      <Card T={T} pad="6px 16px">
        {DATA.inflowTxns.map((t, i) => <FlowRow key={i} T={T} item={t} sign="+" divider={i < DATA.inflowTxns.length - 1} />)}
      </Card>
    </Screen>
  );
}
function Stat({ T, label, value }) {

    <div style={{ fontSize: 16, fontWeight: 700, marginTop: 4, color: T.ink, fontVariantNumeric: 'tabular-nums' }}>

      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <span style={{ fontWeight: 600 }}>Dark mode</span>
        <button onClick={() => onDark(!dark)} style={{ width: 42, height: 25, borderRadius: 999, border: 'none', cursor: 'pointer', background: dark ? '#34c759' : 'rgba(0,0,0,0.15)', position: 'relative', transition: 'background .15s' }}>
          <span style={{ position: 'absolute', top: 2.5, left: 2.5, width: 20, height: 20, borderRadius: 999, background: '#fff', boxShadow: '0 1px 2px rgba(0,0,0,0.25)', transform: dark ? 'translateX(17px)' : 'translateX(0)', transition: 'transform .15s ease-out' }} />
        </button>
      </div>
      <div style={{ fontSize: 11, color: '#9a9a9a', lineHeight: 1.5, marginTop: 12 }}>Every accent re-themes all three screens — banks brand the module without layout changes.</div>
    </div>
  );
}

/* ── app ───────────────────────────────────────────────────── */
function CashflowApp() {
  const [accent, setAccent] = useState('#10A37F');
  const [dark, setDark] = useState(false);
  const T = makeTheme(dark, accent);

  const [stack, setStack] = useState([{ screen: 'landing' }]);
  const [anim, setAnim] = useState('fwd');
  const [period, setPeriod] = useState(DATA.period);
  const [periodOpen, setPeriodOpen] = useState(false);
  const scroller = useRef(null);

  const nav = (to) => {
    if (to === 'back') { setAnim('back'); setStack(s => s.length > 1 ? s.slice(0, -1) : s); }
    else { setAnim('fwd'); setStack(s => [...s, { screen: to }]); }
  };
  const top = stack[stack.length - 1];
  useEffect(() => { if (scroller.current) scroller.current.scrollTop = 0; }, [stack.length]);

  const render = () => {
    const common = { T, period, onPeriod: () => setPeriodOpen(true), nav };
    if (top.screen === 'outflow') return <Outflow {...common} />;
    if (top.screen === 'inflow') return <Inflow {...common} />;
    return <Landing {...common} />;
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 32, flexWrap: 'wrap', background: dark ? '#030109' : '#E2E8E6', padding: 24, boxSizing: 'border-box', transition: 'background .3s' }}>
      <div style={{ width: 390, height: 844, borderRadius: 48, overflow: 'hidden', position: 'relative', background: T.bg, boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)' }}>
        {/* dynamic island */}
        <div style={{ position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)', width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50 }} />
        <StatusBar T={T} />
        <div ref={scroller} className="cf-screens" style={{ height: '100%', overflowY: 'auto', overflowX: 'hidden', paddingTop: 56 }}>
          <div key={stack.length + '-' + top.screen} className={anim === 'fwd' ? 'slide-fwd' : 'slide-back'}>{render()}</div>
        </div>
        <PeriodSheet T={T} open={periodOpen} onClose={() => setPeriodOpen(false)} period={period} onPick={setPeriod} />
        {/* home indicator */}
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60, height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end', paddingBottom: 8, pointerEvents: 'none' }}>
          <div style={{ width: 139, height: 5, borderRadius: 100, background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)' }} />
        </div>
      </div>
      <ThemePanel accent={accent} dark={dark} onAccent={setAccent} onDark={setDark} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CashflowApp />);
</script>
</body>
</html>
